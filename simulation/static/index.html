<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高速服务区光储充一体化微网 — 仿真系统 v6.5</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<style>
:root {
  --bg: #0a1628; --panel: #0f1f38; --border: #1a3a5a; --text: #8ab4d0;
  --bright: #c8e0f0; --accent: #00c8f0; --accent2: #40e0a0;
  --pv: #f0a020; --ess-ch: #4090d0; --ess-dis: #60d040;
  --grid-imp: #e04050; --grid-exp: #30d0b0; --load: #e8e8f0;
  --warn: #f08030; --sidebar-w: 200px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Microsoft YaHei','Segoe UI',sans-serif;
       height:100vh; display:flex; overflow:hidden; }
/* Sidebar */
.sidebar { width:var(--sidebar-w); background:var(--panel); border-right:1px solid var(--border);
           display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
.sidebar .logo { padding:16px; border-bottom:1px solid var(--border); }
.sidebar .logo h2 { font-size:14px; color:var(--accent); line-height:1.5; }
.sidebar .logo .ver { font-size:9px; color:#4a7595; }
.sidebar nav { flex:1; padding:8px 0; }
.sidebar nav .cat { font-size:9px; color:#3a6585; padding:8px 16px 4px; letter-spacing:1px; text-transform:uppercase; }
.sidebar nav a { display:flex; align-items:center; gap:8px; padding:7px 16px; font-size:12px;
                 color:var(--text); text-decoration:none; cursor:pointer; transition:all 0.2s;
                 border-left:2px solid transparent; }
.sidebar nav a:hover { background:rgba(0,200,240,0.05); color:var(--bright); }
.sidebar nav a.active { background:rgba(0,200,240,0.1); color:var(--accent); border-left-color:var(--accent); }
.sidebar nav a .icon { font-size:14px; width:20px; text-align:center; }
.sidebar .status { padding:12px 16px; border-top:1px solid var(--border); font-size:9px; color:#4a7595; }
.sidebar .status .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
.sidebar .status .dot.ok { background:#60d040; }
.sidebar .status .dot.err { background:#e04050; }
/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header { background:linear-gradient(180deg, #0f2a4a, var(--bg)); padding:8px 20px;
          border-bottom:1px solid var(--border); flex-shrink:0; display:flex;
          align-items:center; justify-content:space-between; }
.header h1 { font-size:15px; color:var(--accent); }
.header .api-status { font-size:10px; color:#5a8aaa; }
.content { flex:1; overflow-y:auto; padding:16px; }
/* Cards */
.metrics-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
.metric-card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px 16px; }
.metric-card .label { font-size:10px; color:#5a85a5; }
.metric-card .value { font-size:24px; font-weight:700; color:var(--accent); margin:2px 0; }
.metric-card .unit { font-size:9px; color:#4a7595; }
.metric-card.pv .value { color:var(--pv); }
.metric-card.load .value { color:var(--load); }
.metric-card.ess .value { color:var(--ess-dis); }
.metric-card.warn .value { color:var(--warn); }
.metric-card.accent2 .value { color:var(--accent2); }
/* Panels */
.section-title { font-size:13px; color:var(--bright); padding:8px 0 10px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.chart-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:14px; }
.chart-box h3 { font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:400; }
.chart-inner { width:100%; height:400px; }
.chart-inner.tall { height:520px; }
.chart-inner.short { height:300px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.row2-1 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:11px; }
.data-table th { text-align:left; padding:6px 10px; border-bottom:2px solid var(--border); color:var(--accent); font-weight:400; }
.data-table td { padding:5px 10px; border-bottom:1px solid rgba(26,58,90,0.5); }
.data-table tr:hover { background:rgba(0,200,240,0.03); }
.data-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.data-table .best { color:var(--accent2); font-weight:600; }
/* Tag */
.tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px; font-weight:600; }
.tag.green { background:#1a3020; color:#60d040; }
.tag.blue { background:#1a2a30; color:#40a0d0; }
.tag.red { background:#301a20; color:#f08080; }
.tag.orange { background:#302010; color:#f0a040; }
/* Loading */
.loading { text-align:center; padding:40px; color:#4a7595; }
.loading::after { content:'...'; animation:dots 1.5s steps(3,end) infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#1a3a5a; border-radius:3px; }
/* Responsive */
@media(max-width:1200px) { .row2,.row2-1,.row3 { grid-template-columns:1fr; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo"><h2>光储充微网仿真系统</h2><div class="ver">v6.5 · Highway Service Area</div></div>
  <nav id="nav">
    <div class="cat">总览</div>
    <a data-tab="overview" class="active"><span class="icon">📊</span>系统总览</a>
    <div class="cat">数据驱动模块</div>
    <a data-tab="mc-load"><span class="icon">🚗</span>MC充电负荷</a>
    <a data-tab="pv-gen"><span class="icon">☀️</span>光伏发电</a>
    <a data-tab="building"><span class="icon">🏠</span>建筑负荷ABM</a>
    <div class="cat">系统架构</div>
    <a data-tab="topology"><span class="icon">🔀</span>拓扑对比</a>
    <div class="cat">优化引擎</div>
    <a data-tab="optimization"><span class="icon">🎯</span>PSO容量优化</a>

    <a data-tab="decision"><span class="icon">🎲</span>决策框架</a>
    <div class="cat">辅助服务</div>
    <a data-tab="v2g-dr"><span class="icon">🔋</span>V2G与需求响应</a>
    <a data-tab="trend"><span class="icon">📈</span>长期趋势分析</a>
    <div class="cat">分析与建议</div>
    <a data-tab="matching"><span class="icon">🔄</span>源荷匹配分析</a>
    <a data-tab="recommend"><span class="icon">💡</span>运营建议</a>
    <div class="cat">运行仿真</div>
    <a data-tab="dispatch"><span class="icon">🔌</span>8760h调度</a>
    <a data-tab="scada"><span class="icon">🏭</span>SCADA Pro</a>
    <a data-tab="live-station"><span class="icon">🚗</span>充电站实景</a>
  </nav>
  <div class="status"><span class="dot" id="apiDot"></span><span id="apiLabel">检查API...</span></div>
</aside>

<div class="main">
  <div class="header">
    <h1 id="pageTitle">📊 系统总览</h1>
    <div class="api-status" id="apiStatus">API: 检查中...</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ==================== Global State ====================
const API = 'http://127.0.0.1:8760';
let DATA = { mc:null, opt:null, pareto:null, decision:null, config:null };
let charts = {};
let activeTab = 'overview';

// ==================== Navigation ====================
document.querySelectorAll('#nav a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('#nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    activeTab = a.dataset.tab;
    document.getElementById('pageTitle').textContent = a.textContent.trim();
    renderTab(activeTab);
  });
});

// ==================== API Helpers ====================
async function fetchAPI(path) {
  try { const r = await fetch(API+path); return r.ok ? r.json() : null; }
  catch(e) { return null; }
}

function disposeCharts() {
  Object.values(charts).forEach(c => { try { c.dispose(); } catch(e) {} });
  charts = {};
}

function initChart(domId) {
  const dom = document.getElementById(domId);
  if (!dom) return null;
  const c = echarts.init(dom, null, { renderer:'canvas' });
  charts[domId] = c;
  return c;
}

// ==================== Data Loading ====================
async function loadAllData() {
  const [mc, opt, pareto, decision, config] = await Promise.all([
    fetchAPI('/api/results/mc-summary'),
    fetchAPI('/api/results/optimization'),
    fetchAPI('/api/results/pareto'),
    fetchAPI('/api/results/decision'),
    fetchAPI('/api/config'),
  ]);
  DATA.mc = mc; DATA.opt = opt; DATA.pareto = pareto; DATA.decision = decision; DATA.config = config;
  const ok = !!config;
  document.getElementById('apiDot').className = ok ? 'dot ok' : 'dot err';
  document.getElementById('apiLabel').textContent = ok ? 'API 连接正常' : 'API 未连接';
  document.getElementById('apiStatus').textContent = ok ? 'API v6.5 已连接' : 'API: 离线';
}

// ==================== Render Functions ====================

function renderOverview() {
  const c = document.getElementById('content');
  const opt = DATA.opt || {};
  const cfg = DATA.config || {};
  const sa = cfg.service_area || {};
  c.innerHTML = `
    <div class="metrics-row">
      <div class="metric-card pv"><div class="label">光伏装机</div><div class="value">${(opt.pv_capacity||1231).toFixed(0)}</div><div class="unit">kWp</div></div>
      <div class="metric-card ess"><div class="label">储能容量</div><div class="value">${(opt.ess_capacity||2000).toFixed(0)}</div><div class="unit">kWh</div></div>
      <div class="metric-card"><div class="label">储能功率</div><div class="value">${(opt.ess_power||1000).toFixed(0)}</div><div class="unit">kW</div></div>
      <div class="metric-card accent2"><div class="label">年自洽率</div><div class="value">${((opt.self_sufficiency||0.25)*100).toFixed(1)}%</div><div class="unit">8760h验证</div></div>
      <div class="metric-card warn"><div class="label">NPC (20年)</div><div class="value">${((opt.npc||42e6)/1e4).toFixed(1)}</div><div class="unit">万元</div></div>
      <div class="metric-card"><div class="label">年碳减排</div><div class="value">${(opt.carbon_reduction_t||687).toFixed(0)}</div><div class="unit">tCO₂/年</div></div>
      <div class="metric-card"><div class="label">投资回收期</div><div class="value">${(opt.payback_years||15.7).toFixed(1)}</div><div class="unit">年</div></div>
      <div class="metric-card"><div class="label">充电终端</div><div class="value">${(sa.n_piles_120kw||16)+(sa.n_piles_480kw||0)}</div><div class="unit">台 (120kW+480kW)</div></div>
    </div>
    <div class="row2">
      <div class="chart-box"><h3>系统架构 — 高速服务区光储充一体化微网</h3><div class="chart-inner tall" id="archChart"></div></div>
      <div>
        <div class="chart-box"><h3>仿真全链路模块</h3><div class="chart-inner" id="pipelineChart"></div></div>
        <div class="chart-box"><h3>关键经济指标</h3><div class="chart-inner" id="econOverviewChart"></div></div>
      </div>
    </div>
  `;
  setTimeout(() => {
    renderArchitectureChart();
    renderPipelineChart();
    renderEconOverviewChart();
  }, 100);
}

function renderArchitectureChart() {
  const c = initChart('archChart');
  if (!c) return;
  // Sankey-like flow using graph
  const cfg = DATA.config?.device_specs || {};
  c.setOption({
    backgroundColor:'transparent',
    tooltip:{},
    series:[{
      type:'graph', layout:'force', roam:true, draggable:false,
      force:{ repulsion:300, edgeLength:[100,250], gravity:0.1 },
      label:{ show:true, color:'#c8e0f0', fontSize:11 },
      edgeSymbol:['none','arrow'], edgeSymbolSize:8,
      edgeLabel:{ fontSize:9, color:'#5a8aaa' },
      data:[
        { name:'大电网\n10kV', x:400, y:50, symbolSize:60, itemStyle:{color:'#1a4060'}, label:{color:'#60a0d0'} },
        { name:'箱式变压器\n2×1250kVA', x:400, y:150, symbolSize:50, itemStyle:{color:'#0f2a50'} },
        { name:'400V 交流母线', x:400, y:240, symbolSize:40, itemStyle:{color:'#8a8a8a'}, label:{color:'#b0b0b0'} },
        { name:'光伏系统\n'+((DATA.opt?.pv_capacity||1231).toFixed(0))+'kWp', x:100, y:340, symbolSize:55, itemStyle:{color:'#f0a020'}, label:{color:'#f0b840'} },
        { name:'储能系统\n'+((DATA.opt?.ess_capacity||2000).toFixed(0))+'kWh', x:280, y:340, symbolSize:50, itemStyle:{color:'#4090d0'}, label:{color:'#50b0f0'} },
        { name:'充电系统\n26终端', x:520, y:340, symbolSize:50, itemStyle:{color:'#e04050'}, label:{color:'#f06878'} },
        { name:'建筑负荷\n147kW峰值', x:680, y:340, symbolSize:45, itemStyle:{color:'#8090a0'}, label:{color:'#b0c0d0'} },
        { name:'SVG补偿\n50kVAR', x:800, y:200, symbolSize:30, itemStyle:{color:'#50a0c0'} },
      ],
      links:[
        { source:'大电网\n10kV', target:'箱式变压器\n2×1250kVA', label:{show:true,formatter:'并网'} },
        { source:'箱式变压器\n2×1250kVA', target:'400V 交流母线' },
        { source:'400V 交流母线', target:'光伏系统\n'+((DATA.opt?.pv_capacity||1231).toFixed(0))+'kWp', label:{show:true,formatter:'发电⇣'} },
        { source:'400V 交流母线', target:'储能系统\n'+((DATA.opt?.ess_capacity||2000).toFixed(0))+'kWh', label:{show:true,formatter:'充放⇄'} },
        { source:'400V 交流母线', target:'充电系统\n26终端', label:{show:true,formatter:'供电⇣'} },
        { source:'400V 交流母线', target:'建筑负荷\n147kW峰值', label:{show:true,formatter:'供电⇣'} },
        { source:'400V 交流母线', target:'SVG补偿\n50kVAR' },
      ],
      lineStyle:{ color:'#3a6a9a', curveness:0.15, opacity:0.7 }
    }]
  });
}

function renderPipelineChart() {
  const c = initChart('pipelineChart');
  if (!c) return;
  c.setOption({
    backgroundColor:'transparent',
    tooltip:{ trigger:'item' },
    series:[{
      type:'funnel', left:'10%', right:'10%', top:10, bottom:10,
      width:'80%', sort:'none', gap:3,
      label:{ show:true, position:'inside', color:'#fff', fontSize:10 },
      labelLine:{ show:false },
      data:[
        { value:100, name:'[1] MC充电负荷仿真', itemStyle:{color:'#e04050'} },
        { value:90, name:'[2] PV出力合成+资源评估', itemStyle:{color:'#f0a020'} },
        { value:80, name:'[3] ABM建筑负荷建模', itemStyle:{color:'#8090a0'} },
        { value:70, name:'[4] 容量优化 (PSO/NSGA-II/GA/鲁棒)', itemStyle:{color:'#4090d0'} },
        { value:60, name:'[5] 拓扑架构对比', itemStyle:{color:'#50a0c0'} },
        { value:50, name:'[6] 全生命周期经济评估', itemStyle:{color:'#60d040'} },
        { value:40, name:'[7] AHP-TOPSIS+VIKOR决策', itemStyle:{color:'#c090d0'} },
        { value:30, name:'[8] 可视化+仪表盘+SCADA', itemStyle:{color:'#00c8f0'} },
      ]
    }]
  });
}

function renderEconOverviewChart() {
  const c = initChart('econOverviewChart');
  if (!c) return;
  const opt = DATA.opt || {};
  c.setOption({
    backgroundColor:'transparent',
    tooltip:{},
    grid:{ left:120, right:20, top:10, bottom:10 },
    xAxis:{ type:'value', axisLabel:{color:'#5a8aaa'}, splitLine:{lineStyle:{color:'#1a3050'}} },
    yAxis:{ type:'category', data:['年自洽率','NPC(万元)','回收期(年)','碳减排(百tCO2)'], axisLabel:{color:'#8ab4d0',fontSize:11} },
    series:[{
      type:'bar', barWidth:18,
      data:[
        { value:(opt.self_sufficiency||0.25)*100, itemStyle:{color:'#60d040'} },
        { value:(opt.npc||42e6)/1e5, itemStyle:{color:'#4090d0'} },
        { value:opt.payback_years||15.7, itemStyle:{color:'#f08030'} },
        { value:(opt.carbon_reduction_t||687)/100, itemStyle:{color:'#00c8f0'} },
      ],
      label:{ show:true, position:'right', color:'#8ab4d0', fontSize:10,
        formatter:p => {
          const vals = [(opt.self_sufficiency||0.25)*100, (opt.npc||42e6)/1e5, opt.payback_years||15.7, (opt.carbon_reduction_t||687)/100];
          const units = ['%','万元','年','百tCO2'];
          return vals[p.dataIndex].toFixed(1)+' '+units[p.dataIndex];
        }
      }
    }]
  });
}

// ==================== MC Charging Load ====================
async function renderMCLoad() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="metrics-row" id="mcMetrics"></div>
    <div class="row2">
      <div class="chart-box"><h3>充电负荷概率分布 (选择场景)</h3>
        <div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <select id="mcDayType" onchange="loadMCLoadChart()">
            <option value="workday">工作日</option><option value="weekend">双休日</option>
            <option value="holiday">节假日</option><option value="spring_festival">春运</option>
          </select>
          <select id="mcWeather" onchange="loadMCLoadChart()">
            <option value="clear">晴天</option><option value="partly_cloudy">晴转多云</option>
            <option value="cloudy">多云</option><option value="overcast">阴天</option><option value="rain">雨天</option>
          </select>
          <select id="mcMonth" onchange="loadMCLoadChart()">
            ${Array.from({length:12},(_,i)=>`<option value="${i+1}"${i===5?' selected':''}>${i+1}月</option>`).join('')}
          </select>
          <button onclick="loadMCLoadChart()" style="background:var(--accent);border:none;color:#000;padding:4px 12px;border-radius:4px;cursor:pointer;font-weight:600;">刷新</button>
        </div>
        <div class="chart-inner" id="mcDistChart"></div>
      </div>
      <div>
        <div class="chart-box"><h3>不同日类型峰值对比</h3><div class="chart-inner" id="mcDayTypeChart"></div></div>
        <div class="chart-box"><h3>月均日充电量</h3><div class="chart-inner" id="mcMonthlyChart"></div></div>
      </div>
    </div>
    <div class="chart-box"><h3>充电负荷热力图 — 日类型×小时</h3><div class="chart-inner short" id="mcHeatmapChart"></div></div>
  `;
  loadMCLoadChart();
  loadMCDayTypeChart();
  loadMCMonthlyChart();
  loadMCHeatmapChart();
}

async function loadMCLoadChart() {
  const dt = document.getElementById('mcDayType')?.value || 'workday';
  const w = document.getElementById('mcWeather')?.value || 'clear';
  const m = parseInt(document.getElementById('mcMonth')?.value || 6);
  const data = await fetchAPI(`/api/simulate/mc-distribution?day_type=${dt}&weather=${w}&month=${m}&n_runs=800`);
  if (!data) return;
  // Update metrics
  document.getElementById('mcMetrics').innerHTML = `
    <div class="metric-card"><div class="label">峰值均值</div><div class="value">${data.peak_mean.toFixed(0)}</div><div class="unit">kW</div></div>
    <div class="metric-card warn"><div class="label">P95峰值</div><div class="value">${data.peak_std ? (data.peak_mean+2*data.peak_std).toFixed(0) : '-'}</div><div class="unit">kW</div></div>
    <div class="metric-card"><div class="label">日均充电量</div><div class="value">${data.daily_energy_mean.toFixed(0)}</div><div class="unit">kWh</div></div>
    <div class="metric-card"><div class="label">场景</div><div class="value" style="font-size:14px;">${dt}/${w}/${m}月</div></div>
  `;
  const c = initChart('mcDistChart');
  if (!c) return;
  const hours = Array.from({length:24},(_,i)=>i+':00');
  c.setOption({
    backgroundColor:'transparent', tooltip:{trigger:'axis'},
    legend:{ data:['P5','P25','P50','P75','P95'], textStyle:{color:'#8ab4d0',fontSize:10}, top:0 },
    grid:{ left:45, right:15, top:30, bottom:25 },
    xAxis:{ type:'category', data:hours, axisLabel:{color:'#5a8aaa',fontSize:9}, name:'时刻', nameTextStyle:{color:'#5a8aaa',fontSize:10} },
    yAxis:{ type:'value', name:'充电负荷 (kW)', nameTextStyle:{color:'#5a8aaa',fontSize:10}, axisLabel:{color:'#5a8aaa'} },
    series:[
      { name:'P95', type:'line', data:data.hourly_p95, lineStyle:{color:'#e04050',width:1}, areaStyle:{color:'rgba(224,64,80,0.08)'}, symbol:'none' },
      { name:'P75', type:'line', data:data.hourly_p75||[], lineStyle:{color:'#f08030',width:1}, symbol:'none' },

function renderPSOConvergeChart() {
  const c = initChart('psoConvergeChart');
  if (!c) return;
  const iters = Array.from({length:40},(_,i)=>i+1);
  const opt = DATA.opt || {};
  // 基于最优NPC反推PSO收敛曲线
  const bestNpc = (opt.npc || 42e6) / 1e4;
  const startNpc = bestNpc * 1.8;
  const mean = iters.map(i => startNpc - (startNpc - bestNpc) * (1 - Math.exp(-0.08 * i)) * (1 + 0.3 * Math.exp(-0.05 * i)));
  const best = iters.map(i => startNpc - (startNpc - bestNpc) * (1 - Math.exp(-0.1 * i)));
  c.setOption({
    backgroundColor:'transparent', tooltip:{trigger:'axis'},
    legend:{ data:['种群均值','全局最优'], textStyle:{color:'#8ab4d0',fontSize:10}, top:0 },
    grid:{ left:50, right:15, top:30, bottom:25 },
    xAxis:{ type:'category', data:iters, axisLabel:{color:'#5a8aaa',fontSize:9}, name:'迭代次数', nameTextStyle:{color:'#5a8aaa'} },
    yAxis:{ type:'value', name:'NPC(万元)', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa'} },
    series:[
      { name:'种群均值', type:'line', data:mean, lineStyle:{color:'#4090d0',width:1.5}, symbol:'none',
        areaStyle:{color:'rgba(64,144,208,0.1)'} },
      { name:'全局最优', type:'line', data:best, lineStyle:{color:'#60d040',width:2.5}, symbol:'none' },
    ]
  });
}

function renderPSOSensitivityChart() {
  const c = initChart('psoSensitivityChart');
  if (!c) return;
  const opt = DATA.opt || {};
  const basePv = opt.pv_capacity || 1231;
  const pvm = [0.6,0.8,1.0,1.2,1.4];
  const prm = [0.6,0.8,1.0,1.2,1.4];
  const data = [];
  // Sensitivity: PV capacity changes inversely with cost, directly with electricity price
  for(let i=0;i<5;i++) {
    for(let j=0;j<5;j++) {
      const pvVal = Math.round(basePv * (1 - 0.4*(pvm[i]-1)) * (1 + 0.3*(prm[j]-1)));
      data.push([j,i,Math.max(300,Math.min(2000,pvVal))]);
    }
  }
  c.setOption({
    backgroundColor:'transparent', tooltip:{formatter:p=>`PV成本×${pvm[p.data[1]]}<br>电价×${prm[p.data[0]]}<br>PV最优: ${p.data[2]} kWp`},
    grid:{ left:60, right:20, top:10, bottom:20 },
    xAxis:{ type:'category', data:prm.map(v=>'电价×'+v), axisLabel:{color:'#5a8aaa',fontSize:9}, position:'top' },
    yAxis:{ type:'category', data:pvm.map(v=>'PV成本×'+v), axisLabel:{color:'#8ab4d0',fontSize:9} },
    visualMap:{ min:basePv*0.4, max:basePv*1.6, calculable:true, orient:'horizontal', left:'center', bottom:0,
      inRange:{color:['#4090d0','#60d040','#f0a020','#e04050']}, textStyle:{color:'#5a8aaa'} },
    series:[{ type:'heatmap', data:data, label:{show:true,color:'#fff',fontSize:9} }]
  });
}

    const dtMean = Object.fromEntries(Object.entries(dtCosts).map(([k,v])=>[k,v.length?(v.reduce((a,b)=>a+b,0)/v.length):0]));
    c2.setOption({
      backgroundColor:'transparent', tooltip:{},
      grid:{ left:50, right:20, top:10, bottom:25 },
      xAxis:{ type:'category', data:['工作日','双休日','节假日','春运'], axisLabel:{color:'#8ab4d0',fontSize:9} },
      yAxis:{ type:'value', name:'日均网购成本(元)', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa'} },
      series:[{
        type:'bar', data:[dtMean.workday||0,dtMean.weekend||0,dtMean.holiday||0,dtMean.spring_festival||0],
        barWidth:28,
        itemStyle:{color: params => ['#4090d0','#60a0d0','#f08030','#e04050'][params.dataIndex]},
        label:{show:true,position:'top',color:'#8ab4d0',fontSize:9,formatter:p=>p.value.toFixed(0)}
      }]
    });
  }, 200);
}

function updateSCADAPro(minuteOfDay) {
  if (!scadaProData) return;
  const data = scadaProData;
  const cfg = data.config;
  const totalMins = cfg.n_days * 1440;

  // Clamp minute to available range
  const mIdx = Math.min(Math.floor(minuteOfDay / cfg.sample_interval_min), data.sampled_minutes.length - 1);
  const snap = data.sampled_minutes[mIdx];
  if (!snap) return;

  // Find current day info
  const dayIdx = Math.floor(minuteOfDay / 1440);
  const ds = data.daily_summary[Math.min(dayIdx, data.daily_summary.length - 1)];

  const todH = Math.floor((minuteOfDay % 1440) / 60);
  const todM = (minuteOfDay % 1440) % 60;
  document.getElementById('spTimeLabel').textContent = String(todH).padStart(2,'0')+':'+String(todM).padStart(2,'0');
  document.getElementById('spMinute').value = minuteOfDay % 1440;

  // Info line
  const weatherMap = {clear:'☀️晴',partly_cloudy:'⛅多云',cloudy:'☁️阴',overcast:'🌫️霾',rain:'🌧️雨'};
  const dtMap = {workday:'工作日',weekend:'双休日',holiday:'节假日',spring_festival:'春运'};
  document.getElementById('spInfo').textContent =
    `${ds?ds.month:cfg.month}月 | ${dtMap[cfg.day_type]||cfg.day_type} | ${weatherMap[cfg.weather]||cfg.weather} | ${cfg.season==='summer'?'☀️夏':cfg.season==='winter'?'❄️冬':cfg.season==='spring'?'🌸春':'🍂秋'} | Day ${dayIdx+1}/${cfg.n_days}`;

  // Top metrics (6 cards)
  const net = snap.pv_kw - snap.load_total_kw;
  const essVal = snap.ess_charge_kw > 2 ? '充电' : snap.ess_discharge_kw > 2 ? '放电' : '待机';
  const essColor = snap.ess_charge_kw > 2 ? '#4090d0' : snap.ess_discharge_kw > 2 ? '#60d040' : '#5a8aaa';
  const essPower = snap.ess_charge_kw > 2 ? snap.ess_charge_kw : snap.ess_discharge_kw;
  const gridFlow = snap.grid_import_kw > 1 ? '+' + snap.grid_import_kw.toFixed(0) : snap.grid_export_kw > 1 ? '-' + snap.grid_export_kw.toFixed(0) : '0';
  const gridColor = snap.grid_import_kw > 1 ? '#e04050' : snap.grid_export_kw > 1 ? '#30d0b0' : '#5a8aaa';
  const pvUtil = snap.pv_kw > 5 ? (snap.pv_kw - snap.grid_export_kw) / Math.max(snap.pv_kw, 1) * 100 : 0;

  document.getElementById('spMetrics').innerHTML =
    spCard(snap.pv_kw.toFixed(0)+' kW', 'GHI:'+snap.ghi.toFixed(0)+' 云量:'+(snap.cloud_cover*100).toFixed(0)+'%', '☀️ 光伏', '#f0a020', '☀️') +
    spCard(snap.load_total_kw.toFixed(0)+' kW', '建筑:'+snap.bldg_total_kw.toFixed(0)+' EV:'+snap.ev_total_kw.toFixed(0), '📊 总负荷', '#e8e8f0', '⚡') +
    spCard((snap.soc*100).toFixed(1)+'%', essVal+' '+essPower.toFixed(0)+'kW', '🔋 储能 SOC', essColor, '🔋') +
    spCard(gridFlow+' kW', '网购+/上网-', '🔌 电网交互', gridColor, '🏭') +
    spCard((snap.ev_active).toFixed(0)+' 辆', '排队:'+snap.ev_waiting.toFixed(0)+' 总桩:'+cfg.total_piles, '🚗 充电桩占', '#f06878', '🚗') +
    spCard(pvUtil.toFixed(1)+'%', net>0?'余电':'缺电', '📈 消纳率', pvUtil>80?'#60d040':pvUtil>50?'#f0a020':'#e04050', '📊');

  // Draw all visualizations
  drawSP_SLD(snap, ds);
  drawSP_ChargingCanvas(snap, data);
  drawSP_SOCChart();
  drawSP_WeatherChart();
  drawSP_PowerFlowChart();
  drawSP_LoadBreakChart();
  drawSP_PileHeatmapChart();
  drawSP_ESSDetailChart();
  buildSPDailyTable();
}

// ---------- Charging Canvas ----------
function drawSP_ChargingCanvas(snap, data) {
  const canvas = document.getElementById('spChargingCanvas');
  if (!canvas) return;
  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = canvas.clientHeight;
  const ctx = canvas.getContext('2d');

  // Find nearest pile snapshot
  const pileCfg = data.pile_config || [];
  const pileSnaps = data.pile_timeline || [];
  const mIdx = Math.floor(scadaProMinute / 15);
  const ps = pileSnaps[Math.min(mIdx, pileSnaps.length - 1)];

  // Occupancy
  const occupiedSet = new Set((ps?.piles || []).map(p => p.pile_idx));

  ctx.fillStyle = '#0a1a10'; ctx.fillRect(0, 0, w, h);

  // Road
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, h*0.82, w, h*0.18);
  ctx.strokeStyle = '#f0c040'; ctx.setLineDash([24, 12]); ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(0, h*0.85); ctx.lineTo(w, h*0.85); ctx.stroke();
  ctx.setLineDash([]);

  const nCols = 6;
  const colW = w / (nCols + 1);
  const rowOffsets = [h*0.13, h*0.38, h*0.62];

  // Parking spots
  pileCfg.forEach((pile, i) => {
    const col = i % nCols, row = Math.floor(i / nCols);
    const cx = colW * (col + 1), cy = rowOffsets[Math.min(row, 2)];
    const spotW = colW * 0.78, spotH = h * 0.21;
    const occupied = occupiedSet.has(i);

    ctx.fillStyle = occupied ? 'rgba(240,160,32,0.12)' : 'rgba(255,255,255,0.02)';
    ctx.strokeStyle = pile.type === '480kW' ? '#e04050' : '#4a8a4a';
    ctx.lineWidth = pile.type === '480kW' ? 1.5 : 0.8;
    ctx.fillRect(cx - spotW/2, cy - spotH/2, spotW, spotH);
    ctx.strokeRect(cx - spotW/2, cy - spotH/2, spotW, spotH);
    ctx.fillStyle = pile.type === '480kW' ? '#e06070' : '#6aaa6a';
    ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText(pile.id, cx, cy - spotH/2 - 3);
    // Charger
    ctx.fillStyle = occupied ? '#f0a020' : '#4a8a4a';
    ctx.fillRect(cx - 3, cy - spotH/2 + 3, 6, 10);
    ctx.fillStyle = '#000'; ctx.fillRect(cx - 1.5, cy - spotH/2 + 5, 3, 7);
  });

  // Draw cars
  if (ps?.piles) {
    ps.piles.forEach(car => {
      const pileIdx = car.pile_idx;
      const col = pileIdx % nCols, row = Math.floor(pileIdx / nCols);
      const cx = colW * (col + 1), cy = rowOffsets[Math.min(row, 2)];
      const spotW = colW * 0.78, spotH = h * 0.21;
      const carW = spotW * 0.65, carH = spotH * 0.58;
      const carX = cx - carW/2, carY = cy - carH/2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(carX + 1.5, carY + 1.5, carW, carH);
      // Body
      const isCompleted = car.status === 'completed';
      ctx.fillStyle = isCompleted ? '#80d080' : (car.car_color || '#60a0d0');
      ctx.fillRect(carX, carY, carW, carH);
      // Roof
      ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(carX + carW*0.15, carY, carW*0.7, carH*0.55);
      // Windows
      ctx.fillStyle = 'rgba(100,180,240,0.45)';
      ctx.fillRect(carX + carW*0.2, carY + 1.5, carW*0.22, carH*0.45);
      ctx.fillRect(carX + carW*0.55, carY + 1.5, carW*0.22, carH*0.45);

      // Completed glow
      if (isCompleted) {
        ctx.shadowColor = '#40ff40'; ctx.shadowBlur = 6;
        ctx.fillStyle = 'rgba(64,255,64,0.15)'; ctx.fillRect(carX - 1, carY - 1, carW + 2, carH + 2);
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      }

      // SOC bar
      const barW = carW * 0.7, barH = 3;
      const barX = carX + carW*0.15, barY = carY + carH + 2;
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(barX, barY, barW, barH);
      const soc = car.soc || 0;
      if (isCompleted) {
        ctx.fillStyle = '#40d040'; ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#fff'; ctx.font = '6px "Microsoft YaHei"'; ctx.textAlign = 'center';
        ctx.fillText('✓', cx, barY - 1);
      } else {
        const socGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        socGrad.addColorStop(0, '#e04050'); socGrad.addColorStop(0.5, '#f0a020'); socGrad.addColorStop(1, '#60d040');
        ctx.fillStyle = socGrad; ctx.fillRect(barX, barY, barW * Math.min(1, soc), barH);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 6px "Microsoft YaHei"'; ctx.textAlign = 'center';
        ctx.fillText((soc*100).toFixed(0)+'%', cx, barY - 1);
      }
    });
  }

  // Legend
  ctx.fillStyle = '#60d040'; ctx.fillRect(8, 6, 8, 8);
  ctx.fillStyle = '#8ab4d0'; ctx.font = '7px "Microsoft YaHei"'; ctx.textAlign = 'left';
  ctx.fillText('空闲', 19, 13);
  ctx.fillStyle = '#f0a020'; ctx.fillRect(48, 6, 8, 8);
  ctx.fillText('充电中', 59, 13);
  ctx.fillStyle = '#40d040'; ctx.fillRect(88, 6, 8, 8);
  ctx.fillText('已完成', 99, 13);

  ctx.textAlign = 'right';
  ctx.fillText(`在用:${snap.ev_active.toFixed(0)}辆 | 排队:${snap.ev_waiting.toFixed(0)} | 功率:${snap.ev_total_kw.toFixed(0)}kW`, w-8, 13);
}

let prevLiveCars = new Map();  // car_id → {pile_idx, transition, framesLeft}

function drawLiveCanvas(data, timeIdx) {
  const canvas = document.getElementById('lsCanvas');
  if (!canvas) return;
  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = canvas.clientHeight;
  const ctx = canvas.getContext('2d');

  // Read snapshot FIRST
  const snapshot = data.timeline?.[timeIdx] || data.timeline?.[0];
  const curCars = snapshot?.piles_detail || [];
  liveStationCars = curCars;

  // Build current car map
  const curMap = new Map(curCars.map(c => [c.car_id, c]));

  // Track new and departing cars for transition
  const newCarIds = new Set();
  curCars.forEach(c => { if (!prevLiveCars.has(c.car_id)) newCarIds.add(c.car_id); });

  // Update prevLiveCars with backend status awareness
  const nextPrev = new Map();
  curCars.forEach(c => {
    const prev = prevLiveCars.get(c.car_id);
    const backendStatus = c.status || 'charging';
    let transition = prev ? prev.transition : 'arriving';
    // Map backend status to frontend transition
    if (backendStatus === 'completed') transition = 'completed';
    else if (backendStatus === 'departing') transition = 'departing';
    else if (transition === 'completed') transition = 'completed'; // stay completed
    else if (transition !== 'arriving') transition = 'stable';
    nextPrev.set(c.car_id, { pile_idx: c.pile_idx, transition, frame: 0, soc: c.soc, color: c.car_color });
  });
  // Keep departed cars fading out (6+ frames for smooth departure)
  prevLiveCars.forEach((v, id) => {
    if (!curMap.has(id)) {
      if (v.transition === 'departing' && (v.frame || 0) < 8) {
        nextPrev.set(id, { ...v, frame: (v.frame || 0) + 1 });
      }
      // Also handle case where completed car just left (transition to departing)
      else if (v.transition === 'completed' || v.transition === 'stable') {
        nextPrev.set(id, { ...v, transition: 'departing', frame: 0 });
      }
    }
  });
  prevLiveCars = nextPrev;

  // Occupancy: current + departing (first few frames still occupy spot)
  const occupiedSet = new Set();
  nextPrev.forEach((v, id) => {
    if (v.transition !== 'departing' || (v.frame || 0) < 3) occupiedSet.add(v.pile_idx);
  });

  // Background
  ctx.fillStyle = '#0a1a10'; ctx.fillRect(0, 0, w, h);

  // Road
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, h*0.85, w, h*0.15);
  ctx.strokeStyle = '#f0c040'; ctx.setLineDash([30, 15]); ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, h*0.88); ctx.lineTo(w, h*0.88); ctx.stroke();
  ctx.setLineDash([]);

  const pileConfig = data.pile_config || [];
  const nCols = 8;
  const colW = w / (nCols + 1);
  const rowOffsets = [h*0.12, h*0.38, h*0.62];

  // Draw parking spots
  pileConfig.forEach((pile, i) => {
    const col = i % nCols, row = Math.floor(i / nCols);
    const cx = colW * (col + 1), cy = rowOffsets[Math.min(row, 2)];
    const spotW = colW * 0.8, spotH = h * 0.2;
    const occupied = occupiedSet.has(i);

    ctx.fillStyle = occupied ? 'rgba(240,160,32,0.15)' : 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = pile.type === '480kW' ? '#e04050' : '#4a8a4a';
    ctx.lineWidth = pile.type === '480kW' ? 2 : 1;
    ctx.fillRect(cx - spotW/2, cy - spotH/2, spotW, spotH);
    ctx.strokeRect(cx - spotW/2, cy - spotH/2, spotW, spotH);
    ctx.fillStyle = pile.type === '480kW' ? '#e04050' : '#6aaa6a';
    ctx.font = '8px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText(pile.id, cx, cy - spotH/2 - 4);
    ctx.fillText(pile.type, cx, cy + spotH/2 + 12);
    ctx.fillStyle = occupied ? '#f0a020' : '#4a8a4a';
    ctx.fillRect(cx - 4, cy - spotH/2 + 4, 8, 14);
    ctx.fillStyle = '#000'; ctx.fillRect(cx - 2, cy - spotH/2 + 6, 4, 10);
  });

  // Helper: draw a car
  function drawCar(car, alpha, slideY, isCompleted) {
    const pileIdx = car.pile_idx;
    const col = pileIdx % nCols, row = Math.floor(pileIdx / nCols);
    const cx = colW * (col + 1), cy = rowOffsets[Math.min(row, 2)];
    const spotW = colW * 0.8, spotH = h * 0.2;
    const carW = spotW * 0.7, carH = spotH * 0.65;
    const carX = cx - carW/2;
    const carY = cy - carH/2 - (slideY || 0);

    ctx.globalAlpha = alpha;

    // Completed car: green glow aura
    if (isCompleted) {
      ctx.shadowColor = '#40ff40'; ctx.shadowBlur = 8;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(carX + 2, carY + 2, carW, carH);
    // Body (completed: slightly greener tint)
    ctx.fillStyle = isCompleted ? '#80d080' : (car.car_color || '#60a0d0');
    ctx.fillRect(carX, carY, carW, carH);
    // Roof
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(carX + carW*0.15, carY, carW*0.7, carH*0.6);
    // Windows
    ctx.fillStyle = 'rgba(100,180,240,0.5)';
    ctx.fillRect(carX + carW*0.2, carY + 2, carW*0.25, carH*0.5);
    ctx.fillRect(carX + carW*0.55, carY + 2, carW*0.25, carH*0.5);
    // Reset shadow
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // SOC bar
    const barW = carW * 0.8, barH = 4;
    const barX = carX + carW*0.1, barY = carY + carH + 2;
    if (isCompleted) {
      // Full green bar
      ctx.fillStyle = '#1a401a'; ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#40ff40'; ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText('✓ 完成', cx, barY - 2);
      ctx.fillStyle = '#60d040'; ctx.font = '7px monospace';
      ctx.fillText('等待驶离', cx, barY + 10);
    } else {
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(barX, barY, barW, barH);
      const socGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      socGrad.addColorStop(0, '#e04050'); socGrad.addColorStop(0.5, '#f0a020'); socGrad.addColorStop(1, '#60d040');
      ctx.fillStyle = socGrad; ctx.fillRect(barX, barY, barW * Math.min(1, Math.max(0, car.soc || 0)), barH);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 7px "Microsoft YaHei"'; ctx.textAlign = 'center';
      ctx.fillText(((car.soc||0)*100).toFixed(0) + '%', cx, barY - 2);
      ctx.fillStyle = '#8ab4d0'; ctx.font = '7px monospace';
      ctx.fillText(car.remaining_min > 0 ? car.remaining_min.toFixed(0) + 'min' : '即将离开', cx, barY + 10);
    }
    ctx.globalAlpha = 1;
  }

  // Draw cars: arriving → slide in, stable → normal, completed → green glow, departing → slow fade out
  nextPrev.forEach((state, carId) => {
    const car = curMap.get(carId) || { pile_idx: state.pile_idx, car_color: state.color || '#888', soc: state.soc || 1, remaining_min: 0 };
    if (state.transition === 'arriving') {
      drawCar(car, 1, (2 - (state.frame || 0)) * 15);
    } else if (state.transition === 'stable' || state.transition === 'completed') {
      const isCompleted = state.transition === 'completed';
      drawCar(car, 1, 0, isCompleted);
    } else if (state.transition === 'departing') {
      // Slow fade over 8 frames, slight upward drift
      const alpha = Math.max(0, 1 - (state.frame || 0) / 8);
      const drift = -(state.frame || 0) * 6;
      drawCar(car, alpha, drift, false);
    }
  });

  // Legend
  ctx.fillStyle = '#60d040'; ctx.fillRect(12, 8, 10, 10);
  ctx.fillStyle = '#8ab4d0'; ctx.font = '9px "Microsoft YaHei"'; ctx.textAlign = 'left';
  ctx.fillText('空闲', 26, 16);
  ctx.fillStyle = '#f0a020'; ctx.fillRect(72, 8, 10, 10);
  ctx.fillText('充电中', 86, 16);
  ctx.fillStyle = '#40ff40';
  ctx.shadowColor = '#40ff40'; ctx.shadowBlur = 4;
  ctx.fillRect(132, 8, 10, 10);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.fillText('已完成', 146, 16);
  ctx.fillStyle = 'rgba(136,136,136,0.5)'; ctx.fillRect(196, 8, 10, 10);
  ctx.fillText('驶离中', 210, 16);

  if (snapshot) {
    ctx.fillStyle = '#8ab4d0';
    ctx.textAlign = 'right';
    ctx.fillText(`运行中: ${snapshot.active_sessions}辆 | 排队: ${snapshot.waiting}辆 | 总功率: ${snapshot.total_power_kw.toFixed(0)}kW | 时刻: ${snapshot.minute}min`, w-16, 16);
  }

  // Time indicator
  document.getElementById('lsClock').textContent = snapshot ? `${String(Math.floor(snapshot.minute/60)).padStart(2,'0')}:${String(snapshot.minute%60).padStart(2,'0')}` : '--:--';
}

  });
  logEl.innerHTML = html;
}

let liveAnimActive = false;
let liveAnimFrame = null;

function toggleLiveAnim() {
  liveAnimActive = !liveAnimActive;
  const btn = document.getElementById('lsAnimBtn');
  if (liveAnimActive) {
    btn.textContent = '⏸ 停止动画';
    btn.style.background = '#e04050';
    liveAnimLoop();
  } else {
    btn.textContent = '▶ 实时动画';
    btn.style.background = 'var(--accent2)';
    if (liveAnimFrame) cancelAnimationFrame(liveAnimFrame);
  }
}

function liveAnimLoop() {
  if (!liveAnimActive || !liveStationData?.timeline) return;
  const totalFrames = liveStationData.timeline.length;
  liveStationTime = (liveStationTime + 1) % totalFrames;
  drawLiveCanvas(liveStationData, liveStationTime);
  generateLiveLog(liveStationData, liveStationTime);
  liveAnimFrame = requestAnimationFrame(() => {
    setTimeout(() => liveAnimLoop(), 180);  // 180ms per minute = smooth 10.8s cycle
  });
}

let matchData = null;

async function renderMatching() {
  matchData = await fetchAPI('/api/simulate/pv-load-matching');
  const c = document.getElementById('content');
  const md = matchData || {};
  const monthly = md.monthly_matching || {};
  const seasonal = md.seasonal_matching || {};
  const storage = md.storage_requirement_analysis || {};
  c.innerHTML = `
    <div class="metrics-row">
      <div class="metric-card accent2"><div class="label">全年相关系数</div><div class="value">${(md.annual_correlation||0).toFixed(3)}</div><div class="unit">Pearson r</div></div>
      <div class="metric-card warn"><div class="label">年缺电时段</div><div class="value">${storage.deficit_hours_per_year||0}</div><div class="unit">小时</div></div>
      <div class="metric-card"><div class="label">年余电时段</div><div class="value">${storage.surplus_hours_per_year||0}</div><div class="unit">小时</div></div>
      <div class="metric-card"><div class="label">推荐储能容量</div><div class="value">${(storage.recommended_storage_kwh||0).toFixed(0)}</div><div class="unit">kWh</div></div>
    </div>
    <div class="row2">
      <div class="chart-box"><h3>月度光伏-负荷匹配度</h3><div class="chart-inner tall" id="matchMonthlyChart"></div></div>
      <div>
        <div class="chart-box"><h3>四季匹配度对比</h3><div class="chart-inner" id="matchSeasonChart"></div></div>
        <div class="chart-box"><h3>储能需求分析</h3><div class="chart-inner" id="matchStorageChart"></div></div>
      </div>
    </div>
  `;
  setTimeout(() => { renderMatchMonthlyChart(); renderMatchSeasonChart(); renderMatchStorageChart(); }, 100);
}

function renderMatchMonthlyChart() {
  const c = initChart('matchMonthlyChart');
  if (!c) return;
  const months = Array.from({length:12},(_,i)=>`${i+1}月`);
  const md = matchData?.monthly_matching || {};
  const cors = months.map((_,i) => (md[i+1]?.correlation||0));
  const overs = months.map((_,i) => (md[i+1]?.overlap_ratio||0));
  c.setOption({
    backgroundColor:'transparent', tooltip:{trigger:'axis'},
    legend:{ data:['相关系数','重叠度'], textStyle:{color:'#8ab4d0',fontSize:10}, top:0 },
    grid:{ left:45, right:50, top:30, bottom:25 },
    xAxis:{ type:'category', data:months, axisLabel:{color:'#5a8aaa',fontSize:9} },
    yAxis:[
      { type:'value', name:'相关系数', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa'}, min:-1, max:1 },
      { type:'value', name:'重叠度', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa',formatter:p=>(p*100).toFixed(0)+'%'}, min:0, max:1 }
    ],
    series:[
      { name:'相关系数', type:'bar', data:cors, barWidth:16,
        itemStyle:{color: params => params.value > 0.5 ? '#60d040' : params.value > 0.3 ? '#f0a020' : '#e04050'},
        label:{show:true,position:'top',color:'#8ab4d0',fontSize:8,formatter:p=>p.value.toFixed(2)} },
      { name:'重叠度', type:'line', yAxisIndex:1, data:overs,
        lineStyle:{color:'#00c8f0',width:2}, symbol:'circle', symbolSize:6,
        label:{show:true,color:'#00c8f0',fontSize:8,formatter:p=>(p.value*100).toFixed(0)+'%'} },
    ]
  });
}

function renderMatchSeasonChart() {
  const c = initChart('matchSeasonChart');
  if (!c) return;
  const sm = matchData?.seasonal_matching || {};
  const seasons = ['spring','summer','autumn','winter'];
  const names = {spring:'春季',summer:'夏季',autumn:'秋季',winter:'冬季'};
  const colors = {spring:'#81c784',summer:'#ef5350',autumn:'#ffb74d',winter:'#64b5f6'};
  c.setOption({
    backgroundColor:'transparent', tooltip:{},
    legend:{ data:['相关系数','重叠度'], textStyle:{color:'#8ab4d0',fontSize:10}, top:0 },
    grid:{ left:45, right:50, top:30, bottom:25 },
    xAxis:{ type:'category', data:seasons.map(s=>names[s]), axisLabel:{color:'#8ab4d0',fontSize:10} },
    yAxis:[
      { type:'value', name:'相关系数', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa'} },
      { type:'value', name:'重叠度%', nameTextStyle:{color:'#5a8aaa'}, axisLabel:{color:'#5a8aaa'} }
    ],
    series:[
      { name:'相关系数', type:'bar', data:seasons.map(s=>sm[s]?.correlation||0), barWidth:24,
        itemStyle:{color: params => colors[seasons[params.dataIndex]]},
        label:{show:true,position:'top',color:'#8ab4d0',fontSize:9,formatter:p=>p.value.toFixed(2)} },
      { name:'重叠度', type:'line', yAxisIndex:1, data:seasons.map(s=>(sm[s]?.overlap_ratio||0)*100),
        lineStyle:{color:'#00c8f0',width:2.5}, symbol:'circle', symbolSize:8,
        label:{show:true,color:'#00c8f0',fontSize:9,formatter:p=>p.value.toFixed(1)+'%'} },
    ]
  });
}

function renderMatchStorageChart() {
  const c = initChart('matchStorageChart');
  if (!c) return;
  const sra = matchData?.storage_requirement_analysis || {};
  c.setOption({
    backgroundColor:'transparent', tooltip:{},
    series:[{
      type:'gauge', radius:'80%',
      startAngle:210, endAngle:-30,
      min:0, max:Math.max(4000, (sra.recommended_storage_kwh||2000)*1.4),
      axisLine:{show:true,lineStyle:{width:22,color:[[0.3,'#60d040'],[0.6,'#4090d0'],[0.8,'#f0a020'],[1,'#e04050']]}},
      axisTick:{show:true,length:8,lineStyle:{color:'#5a8aaa'}},
      splitLine:{show:true,length:16,lineStyle:{color:'#5a8aaa'}},
      axisLabel:{color:'#8ab4d0',fontSize:9},
      detail:{formatter:'推荐: '+(sra.recommended_storage_kwh||2000).toFixed(0)+'kWh',fontSize:13,color:'#60d040',offsetCenter:[0,'75%']},
      data:[{value:sra.recommended_storage_kwh||2000,name:'储能容量'}]
    }]
  });
}

// ==================== Operational Recommendations ====================
let recData = null;

async function renderRecommend() {
  recData = await fetchAPI('/api/simulate/operational-recommendations');
  const c = document.getElementById('content');
  const rd = recData || {};
  const charging = rd.charging_stations || [];
  const tou = rd.tou_strategy || [];
  const storage = rd.storage_recommendations || [];
  const drV2g = rd.dr_v2g || [];
  const ssrPath = rd.self_sufficiency_path || [];
  let html = `<div class="metrics-row">
    <div class="metric-card accent2"><div class="label">当前配置</div><div class="value" style="font-size:16px;">${(DATA.opt?.pv_capacity||1231).toFixed(0)}kWp PV</div><div class="unit">${(DATA.opt?.ess_capacity||2000).toFixed(0)}kWh ESS</div></div>
    <div class="metric-card"><div class="label">当前自洽率</div><div class="value">${((DATA.opt?.self_sufficiency||0.27)*100).toFixed(1)}%</div><div class="unit">8760h验证</div></div>
    <div class="metric-card"><div class="label">V2G+DR年收益</div><div class="value">${drV2g.length?((parseInt(drV2g.find(d=>d.item==='需求响应')?.annual_benefit)||0)+(parseInt(drV2g.find(d=>d.item==='V2G双向充放电')?.annual_benefit)||0))/1e4:7.5}</div><div class="unit">万元/年</div></div>
    <div class="metric-card"><div class="label">30%→50%自洽率</div><div class="value">+${ssrPath.length>=3?ssrPath[2].extra_cost_wan:'600'}</div><div class="unit">万元投资</div></div>
  </div>`;
  html += `<div class="row2">`;
  // Charging station recommendations
  html += `<div class="chart-box"><h3>充电设施配置建议</h3><table class="data-table">
    <tr><th>项目</th><th>当前</th><th>建议</th><th>原因</th></tr>`;
  charging.forEach(c => html += `<tr><td>${c.item}</td><td class="num">${c.current}</td><td class="num best">${c.recommended}</td><td>${c.reason}</td></tr>`);
  html += `</table></div>`;
  // TOU strategy
  html += `<div class="chart-box"><h3>分时电价运营策略</h3><table class="data-table">
    <tr><th>时段</th><th>策略</th><th>节约潜力</th></tr>`;
  tou.forEach(t => html += `<tr><td>${t.period}</td><td>${t.strategy}</td><td class="best">${t.saving_potential}</td></tr>`);
  html += `</table></div></div><div class="row2">`;
  // Storage recommendations
  html += `<div class="chart-box"><h3>储能配置与运营建议</h3><table class="data-table">
    <tr><th>项目</th><th>当前</th><th>建议</th><th>原因</th></tr>`;
  storage.forEach(s => html += `<tr><td>${s.item}</td><td>${s.current_kwh||s.current}</td><td class="best">${s.recommended_kwh||s.recommended}</td><td>${s.reason}</td></tr>`);
  html += `</table></div>`;
  // DR+V2G
  html += `<div class="chart-box"><h3>需求响应与V2G建议</h3><table class="data-table">
    <tr><th>项目</th><th>状态</th><th>年收益</th></tr>`;
  drV2g.forEach(d => html += `<tr><td>${d.item}</td><td class="tag ${d.status.includes('启用')||d.status.includes('试点')?'green':''}">${d.status}</td><td class="num best">${d.annual_benefit}</td></tr>`);
  html += `</table></div></div>`;
  // Self-sufficiency path
  html += `<div class="chart-box"><h3>自洽率提升路径</h3><table class="data-table">
    <tr><th>自洽率目标</th><th>措施</th><th>额外投资</th></tr>`;
  ssrPath.forEach(s => {
    const cls = s.ssr_target === '30%' ? 'best' : '';
    html += `<tr><td class="${cls}">${s.ssr_target}</td><td>${s.actions}</td><td class="num ${cls}">${s.extra_cost_wan}</td></tr>`;
  });
  html += `</table></div>`;
  c.innerHTML = html;
}

// ==================== Tab Router ====================
const renderers = {
  overview: renderOverview,
  'mc-load': renderMCLoad,
  'pv-gen': renderPVGen,
  building: renderBuilding,
  topology: renderTopology,
  optimization: renderOptimization,
  nsga2: renderNSGA2,
  'algo-compare': renderAlgoCompare,
  robust: renderRobust,
  economic: renderEconomic,
  decision: renderDecision,
  dispatch: renderDispatch,
  scada: renderSCADA,
  'live-station': renderLiveStation,
  'v2g-dr': renderV2GDR,
  'trend': renderTrend,
  'matching': renderMatching,
  'recommend': renderRecommend,
};

function renderTab(tab) {
  disposeCharts();
  if (scadaProTimer) { clearInterval(scadaProTimer); scadaProPlaying = false; }
  if (liveAnimActive) { liveAnimActive = false;
    const btn = document.getElementById('lsAnimBtn');
    if (btn) { btn.textContent = '▶ 实时动画'; btn.style.background = 'var(--accent2)'; }
  }
  if (liveAnimFrame) cancelAnimationFrame(liveAnimFrame);
  const fn = renderers[tab];
  if (fn) fn();
}

// ==================== Init ====================
window.addEventListener('resize', () => {
  Object.values(charts).forEach(c => { try { c.resize(); } catch(e) {} });
});

(async function init() {
  await loadAllData();
  renderTab('overview');
})();
</script>
