<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA Pro+ 光储充微网智能决策平台 v7.0</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0a1628; --panel: #0f1f38; --border: #1a3a5a; --text: #8ab4d0;
  --bright: #c8e0f0; --accent: #00c8f0; --accent2: #40e0a0;
  --pv: #f0a020; --ess-ch: #4090d0; --ess-dis: #60d040;
  --grid-imp: #e04050; --grid-exp: #30d0b0; --load: #e8e8f0;
  --warn: #f08030; --sidebar-w: 220px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Microsoft YaHei','Segoe UI',sans-serif;
       height:100vh; display:flex; overflow:hidden; }
.sidebar { width:var(--sidebar-w); background:var(--panel); border-right:1px solid var(--border);
           display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
.sidebar .logo { padding:14px 16px; border-bottom:1px solid var(--border); }
.sidebar .logo h2 { font-size:13px; color:var(--accent); line-height:1.4; }
.sidebar .logo .ver { font-size:9px; color:#4a7595; }
.sidebar nav { flex:1; padding:6px 0; }
.sidebar nav .cat { font-size:9px; color:#3a6585; padding:8px 16px 4px; letter-spacing:1px; }
.sidebar nav a { display:flex; align-items:center; gap:8px; padding:6px 16px; font-size:11px;
                 color:var(--text); text-decoration:none; cursor:pointer; transition:all 0.2s;
                 border-left:2px solid transparent; }
.sidebar nav a:hover { background:rgba(0,200,240,0.05); color:var(--bright); }
.sidebar nav a.active { background:rgba(0,200,240,0.1); color:var(--accent); border-left-color:var(--accent); }
.sidebar nav a .icon { font-size:13px; width:18px; text-align:center; }
.sidebar .status { padding:10px 16px; border-top:1px solid var(--border); font-size:9px; color:#4a7595; }
.sidebar .status .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
.sidebar .status .dot.ok { background:#60d040; }
.sidebar .status .dot.err { background:#e04050; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header { background:linear-gradient(180deg, #0f2a4a, var(--bg)); padding:8px 20px;
          border-bottom:1px solid var(--border); flex-shrink:0; display:flex;
          align-items:center; justify-content:space-between; }
.header h1 { font-size:15px; color:var(--accent); }
.header .api-status { font-size:10px; color:#5a8aaa; }
.data-badge { display:inline-block; background:rgba(0,200,240,0.12); color:var(--accent);
  border:1px solid rgba(0,200,240,0.3); border-radius:3px; padding:1px 6px;
  font-size:9px; margin-left:8px; }
.data-badge.green { color:var(--accent2); border-color:rgba(64,224,160,0.3); background:rgba(64,224,160,0.1); }
.data-badge.warn { color:var(--warn); border-color:rgba(240,128,48,0.3); background:rgba(240,128,48,0.1); }
.data-mini-table { width:100%; border-collapse:collapse; font-size:10px; margin-top:6px; }
.data-mini-table th { color:var(--accent); text-align:left; padding:3px 6px; border-bottom:1px solid var(--border); font-weight:400; }
.data-mini-table td { color:var(--text); padding:3px 6px; border-bottom:1px solid rgba(26,58,90,0.5); }
.data-mini-table td.num { text-align:right; color:var(--bright); font-family:monospace; }
.data-mini-table td.ok { color:var(--accent2); }
.data-mini-table td.warn { color:var(--warn); }
.data-mini-table td.bad { color:var(--grid-imp); }
.content { flex:1; overflow-y:auto; padding:16px; }
.metrics-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:8px; margin-bottom:14px; }
.metric-card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 14px; cursor:pointer; transition:all 0.2s; }
.metric-card:hover { border-color:var(--accent); background:rgba(0,200,240,0.05); }
.metric-card .label { font-size:10px; color:#5a85a5; }
.metric-card .value { font-size:22px; font-weight:700; color:var(--accent); margin:2px 0; }
.metric-card .unit { font-size:8px; color:#4a7595; }
.metric-card.pv .value { color:var(--pv); }
.metric-card.load .value { color:var(--load); }
.metric-card.ess .value { color:var(--ess-dis); }
.metric-card.warn .value { color:var(--warn); }
.metric-card.accent2 .value { color:var(--accent2); }
.section-title { font-size:13px; color:var(--bright); padding:8px 0 10px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.chart-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:12px; }
.chart-box h3 { font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:400; }
.chart-inner { width:100%; height:380px; }
.chart-inner.tall { height:500px; }
.chart-inner.short { height:280px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.row21 { display:grid; grid-template-columns:2fr 1fr; gap:12px; }
.viz-tab-btn { background:rgba(15,31,56,0.8); color:#5a8aaa; border:1px solid var(--border);
  padding:4px 10px; border-radius:4px; cursor:pointer; font-size:10px; transition:all 0.2s; white-space:nowrap; }
.viz-tab-btn:hover { background:rgba(0,200,240,0.1); color:var(--bright); }
.viz-tab-btn.active { background:rgba(0,200,240,0.15); color:var(--accent); border-color:var(--accent); }
.btn { padding:6px 16px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; transition:all 0.2s; border:none; }
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#33d8f8; }
.btn-accent { background:var(--accent2); color:#000; }
.btn-accent:hover { background:#60f0b0; }
.btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); }
.btn-outline:hover { background:rgba(0,200,240,0.1); }
.btn-sm { padding:3px 10px; font-size:9px; }
.sp-select { background:var(--panel); color:var(--text); border:1px solid var(--border);
  padding:4px 8px; border-radius:4px; font-size:10px; }
.sp-input { background:var(--panel); color:var(--bright); border:1px solid var(--border);
  padding:4px 8px; border-radius:4px; font-size:10px; width:80px; }
.sp-range { accent-color:var(--accent); }
.sp-range2 { accent-color:var(--accent2); }
.data-table { width:100%; border-collapse:collapse; font-size:10px; }
.data-table th { text-align:left; padding:5px 8px; border-bottom:2px solid var(--border); color:var(--accent); font-weight:400; }
.data-table td { padding:4px 8px; border-bottom:1px solid rgba(26,58,90,0.5); }
.data-table tr:hover { background:rgba(0,200,240,0.03); }
.data-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.data-table .best { color:var(--accent2); font-weight:600; }
.tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:8px; font-weight:600; }
.tag.green { background:#1a3020; color:#60d040; }
.tag.blue { background:#1a2a30; color:#40a0d0; }
.tag.red { background:#301a20; color:#f08080; }
.tag.orange { background:#302010; color:#f0a040; }
.tag.purple { background:#201a30; color:#a060d0; }
.progress-bar { height:8px; border-radius:4px; background:#0a1624; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.5s; }
.opt-method { background:var(--panel); border:2px solid var(--border); border-radius:8px; padding:12px;
  cursor:pointer; transition:all 0.2s; text-align:center; }
.opt-method:hover { border-color:var(--accent); }
.opt-method.selected { border-color:var(--accent2); box-shadow:0 0 12px rgba(64,224,160,0.2); }
.opt-method .method-name { font-size:13px; color:var(--bright); font-weight:600; }
.opt-method .method-desc { font-size:9px; color:#5a85a5; margin-top:4px; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#1a3a5a; border-radius:3px; }
@media(max-width:1200px) { .row2,.row21,.row3 { grid-template-columns:1fr; } }
.sld-dashboard { display:flex; flex-direction:column; gap:8px; font-size:11px; }
.sld-row { display:flex; gap:8px; align-items:stretch; }
.sld-grid-src { display:flex; align-items:center; gap:12px; padding:6px 12px;
  background:rgba(240,180,32,0.06); border:1px solid rgba(240,180,32,0.25); border-radius:6px; }
.sld-grid-label { font-weight:700; font-size:12px; color:#e0a020; white-space:nowrap; }
.sld-grid-info { font-size:10px; color:#90a8b0; }
.sld-line-v { width:2px; min-height:18px; background:#e0a020; margin:0 auto; border-radius:1px; }
.sld-transformer { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 16px;
  background:rgba(64,128,192,0.06); border:1px solid rgba(64,128,192,0.25); border-radius:6px; }
.sld-tf-name { font-weight:700; font-size:13px; color:#4890c0; }
.sld-tf-spec { font-size:9px; color:#6090b0; text-align:center; line-height:1.4; }
.sld-busbar { display:flex; align-items:center; gap:10px; padding:5px 14px;
  background:rgba(160,160,160,0.05); border-top:2px solid #707070; border-bottom:2px solid #707070; }
.sld-bus-label { font-weight:700; font-size:10px; color:#a0a0a0; white-space:nowrap; }
.sld-bus-phase { display:flex; flex:1; gap:4px; margin-left:8px; }
.sld-bus-phase span { flex:1; height:1px; background:#3a3a3a; }
.sld-feeder { flex:1; min-width:140px; display:flex; flex-direction:column; gap:5px;
  background:rgba(8,14,22,0.9); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
.sld-feeder-label { font-weight:700; font-size:11px; text-align:center; }
.sld-feeder-value { font-size:14px; font-weight:700; text-align:center; }
.sld-feeder-sub { font-size:9px; text-align:center; color:#90a8b8; line-height:1.4; }
.sld-feeder-detail { font-size:8px; color:#607080; text-align:center; line-height:1.3;
  border-top:1px solid rgba(26,58,90,0.4); padding-top:4px; }
.sld-soc-bar { width:100%; height:10px; background:#0a1624; border:1px solid #2a5080; border-radius:5px; overflow:hidden; }
.sld-soc-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#e04050,#f0a020 45%,#50d048); }
.sld-pile-grid { display:grid; grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(3,1fr); gap:1.5px; }
.sld-pile-dot { aspect-ratio:1; border-radius:2px; }
.sld-pile-dot.on { background:#e04050; }
.sld-pile-dot.off { background:#1a1c1c; }
.sld-zone-row { display:flex; gap:2px; }
.sld-zone-chip { padding:1px 4px; border-radius:3px; font-size:8px; text-align:center; }
.sld-status-bar { display:flex; gap:6px; padding:8px 12px;
  background:rgba(6,12,20,0.97); border-top:1px solid #1a2a3a; border-radius:0 0 6px 6px; }
.sld-status-item { flex:1; text-align:center; }
.sld-status-label { font-size:8px; color:#607080; }
.sld-status-value { font-size:10px; font-weight:700; font-family:monospace; }
.sld-arrow-left { color:#e04050; font-size:10px; }
.sld-arrow-right { color:#38c0c0; font-size:10px; }
.loading { text-align:center; padding:40px; color:#4a7595; }
.spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }

/* v7.0: Modal & Clickable */
.modal-overlay { display:none; position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal-box { background:var(--panel); border:1px solid var(--accent); border-radius:10px;
  padding:20px; max-width:700px; max-height:80vh; overflow-y:auto; min-width:400px; }
.modal-box h2 { font-size:14px; color:var(--accent); margin-bottom:12px; }
.modal-box .close { float:right; cursor:pointer; color:var(--text); font-size:18px; line-height:1; }
.modal-box .close:hover { color:var(--bright); }
.clickable-row { cursor:pointer; transition:background 0.15s; }
.clickable-row:hover { background:rgba(0,200,240,0.08) !important; }
.data-table.clickable tr:not(:first-child) { cursor:pointer; }
.data-table.clickable tr:not(:first-child):hover { background:rgba(0,200,240,0.08); }

/* v7.0: Hyperparam panel */
.param-search { width:100%; background:rgba(15,31,56,0.8); border:1px solid var(--border);
  color:var(--bright); padding:5px 8px; border-radius:4px; font-size:9px; margin-bottom:6px; }
.param-group { margin-bottom:8px; }
.param-group .pname { font-size:9px; color:var(--accent); cursor:pointer; margin-bottom:2px; }
.param-group .pval { font-size:8px; color:#5a85a5; font-family:monospace; word-break:break-all; }
.param-group .pcat { font-size:8px; color:#3a6585; margin-bottom:1px; text-transform:uppercase; letter-spacing:1px; }
.collapse-header { cursor:pointer; padding:6px 0; font-size:10px; color:var(--text);
  border-bottom:1px solid rgba(26,58,90,0.5); display:flex;justify-content:space-between;align-items:center; }
.collapse-header:hover { color:var(--bright); }
.collapse-body { display:none; padding:4px 0 0 8px; }
.collapse-body.open { display:block; }

/* v7.0: Optimization improvements */
.algo-card { background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; cursor:pointer; transition:all 0.2s; }
.algo-card:hover { border-color:var(--accent); }
.algo-card.selected { border-color:var(--accent2); box-shadow:0 0 8px rgba(64,224,160,0.15); }
.algo-card .algo-name { font-size:11px; color:var(--bright); font-weight:600; }
.algo-card .algo-params { font-size:8px; color:#5a85a5; margin-top:2px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<script>
// ============================ GLOBAL STATE ============================
const API = 'http://127.0.0.1:8760';
const charts = {};
let activeTab = 'scada';

// SCADA state
let spData = null, spDay = 200, spWeather = 'auto', spNDays = 1;
let spMinute = 720, spTimer = null, spPlaying = false, spViz = 'sld';

// Optimization state
let optMethod = 'pso', optRunning = false;
let optResults = {};

// Data cache for cross-tab sharing
let _cache = {};

// ============================ API ============================
async function fetchAPI(url) {
  try {
    const r = await fetch(API + url);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.warn('API error:', url, e.message);
    return null;
  }
}

async function checkHealth() {
  const h = await fetchAPI('/api/health');
  const dot = document.getElementById('apiDot'), label = document.getElementById('apiLabel');
  const status = document.getElementById('apiStatus');
  if (h && h.status === 'ok') {
    dot.className = 'dot ok'; label.textContent = 'API 在线';
    const extInfo = h.external_data || {};
    const pvCnt = extInfo.pvgis_locations || 0;
    status.innerHTML = 'API: v' + h.version + ' 在线'
      + (pvCnt > 0 ? ' <span class="data-badge">PVGIS:' + pvCnt + '城</span>' : '');
    // Update sidebar data status
    const ds = document.getElementById('dataStatus');
    if (ds && pvCnt > 0) {
      ds.innerHTML = '<span style="color:#60d040;">&#9679;</span> '
        + '<span style="color:#5a85a5;">外部数据: ' + pvCnt + '城市TMY可用</span>';
    }
    // Load detailed data status & hyperparams
    loadDataStatus();
    loadHyperparams();
  } else {
    dot.className = 'dot err'; label.textContent = 'API 离线';
    status.textContent = 'API: 离线';
  }
}

// Data diagnostics — fetch external data status
let _externalData = null;
async function loadDataStatus() {
  try {
    const d = await fetchAPI('/api/data/calibration');
    if (d && d.status) {
      _externalData = d;
      updateDataStatusUI(d);
    }
  } catch(e) { console.warn('External data status fetch failed:', e); }
}

function updateDataStatusUI(d) {
  const ds = document.getElementById('dataStatus');
  if (!ds) return;
  const pvCnt = (d.status.pvgis_locations || []).length;
  const hasACN = d.status.has_acndata;
  let html = '';
  if (pvCnt > 0) {
    html += '<span style="color:#60d040;">&#9679;</span> '
      + '<span style="color:#5a85a5;">PVGIS: ' + pvCnt + '城TMY</span><br>';
  }
  if (hasACN) {
    const acnTotal = (d.acndata_summary && d.acndata_summary.total_sessions) || 0;
    html += '<span style="color:#60d040;">&#9679;</span> '
      + '<span style="color:#5a85a5;">ACN: ' + (acnTotal/1000).toFixed(0) + 'k会话</span><br>';
  }
  const recs = d.recommendations || [];
  if (recs.length > 0) {
    const highRecs = recs.filter(function(r){return r.priority==='high';});
    html += '<span style="color:#f08030;font-size:7px;">' + highRecs.length + '项高优校准建议</span>';
  }
  if (html) {
    ds.innerHTML = html;
  } else {
    ds.innerHTML = '<span style="color:#4a7595;font-size:7px;">无外部数据</span>';
  }
}

// ============================ HYPERPARAM PANEL ============================
let _allParams = [];
async function loadHyperparams() {
  try {
    var d = await fetchAPI('/api/data/hyperparams');
    if (d && d.params) {
      _allParams = d.params;
      renderParamList(_allParams);
    }
  } catch(e) {}
}

function renderParamList(params) {
  var list = document.getElementById('paramList');
  if (!list) return;
  // Group by category
  var cats = {};
  params.forEach(function(p) {
    if (!cats[p.category]) cats[p.category] = [];
    cats[p.category].push(p);
  });
  var html = '';
  Object.keys(cats).forEach(function(cat) {
    html += '<div class="param-group">';
    html += '<div class="pcat">' + cat + ' (' + cats[cat].length + ')</div>';
    cats[cat].forEach(function(p) {
      var v = p.value;
      if (typeof v === 'string' && v.length > 50) v = v.substring(0,47) + '...';
      html += '<div class="pname" title="' + p.name + ': ' + p.value.replace(/"/g,'&quot;') + '" onclick="navigator.clipboard.writeText(\'' + p.name + '\')">' + p.name + '</div>';
      html += '<div class="pval">' + v + '</div>';
    });
    html += '</div>';
  });
  list.innerHTML = html || '<span style="font-size:8px;color:#3a6585;">暂无参数</span>';
}

function filterParams() {
  var q = document.getElementById('paramSearch').value.toLowerCase();
  if (!q) { renderParamList(_allParams); return; }
  renderParamList(_allParams.filter(function(p) {

// Normalize optimization result: npc is raw yuan in JSON, convert to 万元
function normOpt(opt) {
  if (!opt) return {};
  const npcWan = (opt.npc || 0) > 100000 ? (opt.npc / 10000) : (opt.npc || 5376);
  return {
    pv_capacity: opt.pv_capacity || 1231,
    ess_capacity: opt.ess_capacity || 1720,
    ess_power: opt.ess_power || 860,
    npc: npcWan,
    self_sufficiency: opt.self_sufficiency || 0.27,
    lcoe: npcWan * 10000 / Math.max((opt.annual_load_kwh || 4337449) * 20, 1),
    payback_years: opt.payback_years || 14.5,
    carbon_reduction_t: opt.carbon_reduction_t || 667,
    annual_carbon_revenue: opt.annual_carbon_revenue || (opt.carbon_reduction_t || 667) * 70,
    capital_cost: (opt.capital_cost || 12107022) / 10000,
    net_capital_cost: (opt.net_capital_cost || 11465869) / 10000,
    annual_load_kwh: opt.annual_load_kwh || 4337449,
    annual_pv_gen_kwh: opt.annual_pv_gen_kwh || 1169380,
    annual_grid_import_kwh: opt.annual_grid_import_kwh || 3345262,
    annual_grid_cost: opt.annual_grid_cost || 2179768,
    annual_ess_cycles: opt.annual_ess_cycles || 787,
    capex_detail: opt.capex_detail || {},
    subsidy_detail: opt.subsidy_detail || {},
    verify_8760h: opt.verify_8760h || null
  };
}

// ============================ CHART HELPERS ============================
let _renderId = 0;  // abort stale renders on fast tab switch

function initChart(domId) {
  const dom = document.getElementById(domId);
  if (!dom) return null;
  void dom.offsetHeight; // force layout
  if (charts[domId]) {
    if (dom.clientWidth > 0 && dom.clientHeight > 0) return charts[domId];
    try { charts[domId].dispose(); } catch(e) {}
  }
  if (dom.clientWidth === 0 || dom.clientHeight === 0) return null;
  const c = echarts.init(dom);
  charts[domId] = c;
  return c;
}

function updateChartData(domId, option) {
  let c = charts[domId];
  if (!c) {
    const dom = document.getElementById(domId);
    if (!dom) return;
    void dom.offsetHeight;
    c = echarts.init(dom);
    charts[domId] = c;
  }
  // notMerge=false preserves axis/grid/legend config; animation:false on series prevents flicker
  try { c.setOption(option, false); } catch(e) { console.warn('updateChartData:', domId, e.message); }
}

function disposeCharts() {
  Object.values(charts).forEach(c => { try { c.dispose(); } catch(e) {} });
  for (const k of Object.keys(charts)) delete charts[k];
}

function stopSCADATimer() {
  if (spTimer) { clearInterval(spTimer); spTimer = null; }
  spPlaying = false;
}

function metricCard(label, value, unit, color, icon) {
  return `<div class="metric-card" style="border-left:2px solid ${color||'var(--accent)'}">
    <div class="label">${icon||''} ${label}</div>
    <div class="value" style="color:${color||'var(--accent)'}">${value}</div>
    <div class="unit">${unit}</div>
  </div>`;
}

// ============================ CANVAS HELPERS ============================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function updateSCADA(minuteOfDay) {
  if (!spData) return;
  const data = spData, cfg = data.config;
  const mIdx = Math.min(Math.floor(minuteOfDay / cfg.sample_interval_min), data.sampled_minutes.length - 1);
  const snap = data.sampled_minutes[mIdx];
  if (!snap) return;
  const dayIdx = Math.floor(minuteOfDay / 1440);
  const ds = data.daily_summary[Math.min(dayIdx, data.daily_summary.length - 1)];

  const todH = Math.floor((minuteOfDay % 1440) / 60);
  const todM = (minuteOfDay % 1440) % 60;
  const el = id => document.getElementById(id);
  el('spTimeLabel').textContent = String(todH).padStart(2,'0')+':'+String(todM).padStart(2,'0');
  el('spMinute').value = minuteOfDay % 1440;

  const weatherMap = {clear:'☀️晴',partly_cloudy:'⛅多云',cloudy:'☁️阴',overcast:'🌫️霾',rain:'🌧️雨'};
  const dtMap = {workday:'工作日',weekend:'双休日',holiday:'节假日',spring_festival:'春运'};
  el('spInfo').textContent =
    `${ds?ds.month:cfg.month}月 | ${dtMap[cfg.day_type]||cfg.day_type} | ${weatherMap[cfg.weather]||cfg.weather} | Day ${dayIdx+1}/${cfg.n_days}`;

  const essVal = snap.ess_charge_kw > 2 ? '充电' : snap.ess_discharge_kw > 2 ? '放电' : '待机';
  const essColor = snap.ess_charge_kw > 2 ? '#4090d0' : snap.ess_discharge_kw > 2 ? '#60d040' : '#5a8aaa';
  const essPower = snap.ess_charge_kw > 2 ? snap.ess_charge_kw : snap.ess_discharge_kw;
  const gridFlow = snap.grid_import_kw > 1 ? '+' + snap.grid_import_kw.toFixed(0) : snap.grid_export_kw > 1 ? '-' + snap.grid_export_kw.toFixed(0) : '0';
  const gridColor = snap.grid_import_kw > 1 ? '#e04050' : snap.grid_export_kw > 1 ? '#30d0b0' : '#5a8aaa';
  const net = snap.pv_kw - snap.load_total_kw;

  el('spMetrics').innerHTML =
    metricCard('☀️ 光伏出力', snap.pv_kw.toFixed(0)+' kW', 'GHI:'+snap.ghi.toFixed(0)+' W/m²', '#f0a020') +
    metricCard('⚡ 总负荷', snap.load_total_kw.toFixed(0)+' kW', '建筑:'+snap.bldg_total_kw.toFixed(0)+' EV:'+snap.ev_total_kw.toFixed(0), '#e8e8f0') +
    metricCard('🔋 储能 SOC', (snap.soc*100).toFixed(1)+'%', essVal+' '+essPower.toFixed(0)+'kW', essColor) +
    metricCard('🔌 电网交互', gridFlow+' kW', '网购+/上网-', gridColor) +
    metricCard('🚗 充电桩', snap.ev_active.toFixed(0)+' 辆', '排队:'+snap.ev_waiting.toFixed(0)+' 桩:'+cfg.total_piles, '#f06878') +
    metricCard('📈 净负荷', net.toFixed(0)+' kW', net>0?'余电上网':'电网取电', net>0?'#30d0b0':'#e04050');

  if (spViz === 'sld') updateSLDHTML(); else drawSPMainCanvas();
  drawSPCharts();
}

function drawSPMainCanvas() {
  if (spViz === 'sld') return; // SLD renders via HTML, not canvas

function drawPVCanvas(ctx, w, h, snap, cfg) {
  const isDay = snap.ghi > 30;
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h*0.45);
  skyGrad.addColorStop(0, isDay ? '#1a3050' : '#080810'); skyGrad.addColorStop(1, isDay ? '#2a5070' : '#0a0a18');
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, w, h);
  if (isDay && snap.ghi > 50) {
    const sunX = w*0.5 + (spMinute/720 - 1)*w*0.35;
    const sunY = h*0.18 - Math.sin((spMinute-360)/1440*Math.PI)*h*0.1;
    const sa = Math.max(0.1, 1 - snap.cloud_cover);
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 45);
    sg.addColorStop(0, `rgba(255,240,200,${sa})`); sg.addColorStop(0.3, `rgba(255,200,80,${sa*0.6})`);
    sg.addColorStop(1, 'rgba(255,160,30,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(sunX, sunY, 45, 0, Math.PI*2); ctx.fill();
  }
  for (let i = 0; i < 8; i++) {
    const cx = ((i*137+50)%w), cy = 20 + (i*43)%60;
    ctx.fillStyle = `rgba(180,190,200,${snap.cloud_cover*0.5})`; ctx.beginPath(); ctx.ellipse(cx, cy, 35+i*7, 15, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#2a2a2a'; ctx.fillRect(0, h*0.45, w, h*0.55);
  ctx.strokeStyle = '#505050'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, h*0.42); ctx.lineTo(w, h*0.42); ctx.stroke();

  const nStrings = 5, nPerStr = 6;
  const strW = (w-60)/nStrings, pW = strW*0.7, pH = 24;
  const startY = h*0.47;
  for (let s=0; s<nStrings; s++) {
    const sx = 30 + s*strW + strW*0.15;
    ctx.fillStyle = '#80a060'; ctx.font = 'bold 9px "Microsoft YaHei"'; ctx.textAlign = 'center';
    ctx.fillText('串'+(s+1), sx+strW*0.35, startY-10);
    ctx.fillStyle = '#608040'; ctx.font = '8px monospace';
    ctx.fillText((snap.pv_kw/nStrings).toFixed(0)+'kW', sx+strW*0.35, startY-1);
    for (let p=0; p<nPerStr; p++) {
      const py = startY + p*(pH+4);

      ctx.fillStyle = `rgba(${r},${g},${b},${isDay?0.7+irr*0.3:0.15})`;
      ctx.fillRect(sx, py, pW, pH);
      ctx.strokeStyle = 'rgba(180,180,180,0.4)'; ctx.lineWidth = 0.8; ctx.strokeRect(sx, py, pW, pH);
    }

}

function drawESSCanvas(ctx, w, h, snap, cfg) {

    ctx.fillStyle = `rgba(${r},${g},${b},0.2)`; ctx.fillRect(cx+2, cabY+cabH*cellSOC, cabW-4, cabH*(1-cellSOC));
    ctx.strokeStyle = '#204060'; ctx.lineWidth = 1; ctx.strokeRect(cx+2, cabY, cabW-4, cabH);

function drawChgCanvas(ctx, w, h, snap, cfg) {
  ctx.fillStyle = '#0a1620'; ctx.fillRect(0, 0, w, h);

}

let _spChartsBuilt = false;
let _spChartData = null;  // cached chart data for fast playback updates

function buildSPChartData() {
  if (!spData) return null;
  const cfg = spData.config, intv = cfg.sample_interval_min || 5;
  const xD=[],sd=[],gd=[],ghi=[],cc=[],tmp=[],pv=[],ld=[],ec=[],ed=[],gi=[],ge=[],ev=[],bd=[],ax=[];
  spData.sampled_minutes.forEach((s,i)=>{
    const m=i*intv;
    const t = String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
    xD.push(t);
    sd.push((s.soc*100).toFixed(1)); gd.push(s.grid_import_kw - s.grid_export_kw);
    ghi.push(s.ghi.toFixed(0)); cc.push((s.cloud_cover*100).toFixed(0)); tmp.push(s.temp.toFixed(1));
    pv.push(s.pv_kw.toFixed(1)); ld.push(s.load_total_kw.toFixed(1));
    ec.push(s.ess_charge_kw>1?s.ess_charge_kw.toFixed(1):0); ed.push(s.ess_discharge_kw>1?-s.ess_discharge_kw.toFixed(1):0);
    gi.push(s.grid_import_kw.toFixed(1)); ge.push(-s.grid_export_kw.toFixed(1));
    ev.push(s.ev_total_kw.toFixed(1)); bd.push(s.bldg_total_kw.toFixed(1));
    ax.push((s.load_total_kw-s.ev_total_kw-s.bldg_total_kw).toFixed(1));
  });
  const xInterval = Math.max(1, Math.floor(xD.length / 8));
  _spChartData = {xD,sd,gd,ghi,cc,tmp,pv,ld,ec,ed,gi,ge,ev,bd,ax,xInterval};
  return _spChartData;
}

function drawSPCharts() {
  if (!spData) return;
  buildSPChartData();
  if (_spChartsBuilt) {
    // Fast update during playback: use updateChartData (notMerge=true, no animation)
    updateSPChartsFast();
  } else {
    // First render: full chart initialization
    drawSOCChartFull();
    drawWeatherChartFull();
    drawPFChartFull();
    drawLBChartFull();
    _spChartsBuilt = true;
  }
}

function updateSPChartsFast() {
  const d = _spChartData; if (!d) return;
  const noAnim = {animation:false};
  const xOpt = {data:d.xD,axisLabel:{color:'#5a85a5',fontSize:9,interval:d.xInterval}};

  updateChartData('spSOCChart', {
    animation:false, xAxis:xOpt,
    series:[
      {data:d.sd, yAxisIndex:0},
      {data:d.gd, yAxisIndex:1}
    ]
  });
  updateChartData('spWeatherChart', {
    animation:false, xAxis:xOpt,
    series:[
      {data:d.ghi},{data:d.cc},{data:d.tmp}
    ]
  });
  updateChartData('spPowerFlowChart', {
    animation:false, xAxis:xOpt,
    series:[
      {data:d.pv},{data:d.ld},{data:d.ec},{data:d.ed},{data:d.gi},{data:d.ge}
    ]
  });
  updateChartData('spLoadBreakChart', {
    animation:false, xAxis:xOpt,
    series:[
      {data:d.ev},{data:d.bd},{data:d.ax}
    ]
  });
}

function drawSOCChartFull() {
  const c = initChart('spSOCChart'); if (!c) return;
  const d = _spChartData; if (!d) return;
  // Compute dynamic SOC range from actual data to avoid wasted chart space
  const socVals = d.sd.map(v => parseFloat(v)).filter(v => !isNaN(v));
  const socMin = Math.max(0, Math.floor(Math.min(...socVals) / 5) * 5 - 5);
  const socMax = Math.min(100, Math.ceil(Math.max(...socVals) / 5) * 5 + 5);
  c.setOption({
    grid:{top:15,right:15,bottom:25,left:50},tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:d.xD,axisLabel:{color:'#5a85a5',fontSize:9,interval:d.xInterval}},
    yAxis:[

      {type:'value',name:'kW',nameTextStyle:{color:'#e04050'},axisLabel:{color:'#e04050',fontSize:9},splitLine:{show:false}}

      {type:'bar',data:d.gd,yAxisIndex:1,itemStyle:{color:function(p){return p.value>0?'#e04050':'#30d0b0'}},barWidth:2}

function toggleSPPlay() {
  spPlaying = !spPlaying;
  const btn = document.getElementById('spPlayBtn');
  if (spPlaying) {
    btn.textContent = '⏸ 暂停';
    spTimer = setInterval(() => {
      let m = spMinute + 5;
      if (m >= 1440 * spNDays) m = 0;
      spMinute = m;
      updateSCADA(m);
      document.getElementById('spMinute').value = m % 1440;
    }, 100);
  } else {
    btn.textContent = '▶ 播放';
    if (spTimer) clearInterval(spTimer);
  }
}

function drawSPAnnualCalendar(yd) {
  const c = initChart('spAnnualCalendarChart'); if (!c) return;
  const daily = yd.daily || [];
  const ssrByDoy = {};
  daily.forEach(function(d) { ssrByDoy[d.day] = d.ssr; });
  let lastSSR = daily.length > 0 ? daily[0].ssr : 0;
  const monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];
  const expanded = []; let doy = 0;
  for (let m = 1; m <= 12; m++) {
    for (let d2 = 1; d2 <= monthDays[m-1]; d2++) {
      doy++;
      if (ssrByDoy[doy] !== undefined) lastSSR = ssrByDoy[doy];
      const mm = m < 10 ? '0'+m : ''+m;
      const dd = d2 < 10 ? '0'+d2 : ''+d2;
      expanded.push(['2025-'+mm+'-'+dd, lastSSR]);
    }
  }
  c.setOption({
    tooltip:{formatter:function(p){return p.value[0]+'<br/>SSR: '+(p.value[1]*100).toFixed(1)+'%';}},
    visualMap:{min:0,max:1,inRange:{color:['#1a1020','#1a1a30','#1a3020','#306030','#50d060']},text:['高','低'],textStyle:{color:'#5a85a5'},top:5,right:10},
    calendar:{range:'2025',cellSize:[16,14],splitLine:{lineStyle:{color:'#1a3a5a'}},itemStyle:{borderColor:'#1a3a5a',borderWidth:1},dayLabel:{color:'#5a85a5'},monthLabel:{color:'#8ab4d0'}},
    series:[{type:'heatmap',coordinateSystem:'calendar',data:expanded}]
  });
}

function drawSPAnnualSeasonTable(yd) {
  const daily = yd.daily || [];
  const seasons = {'spring':{n:0,pv:0,load:0,grid:0,ssr:0},'summer':{n:0,pv:0,load:0,grid:0,ssr:0},'autumn':{n:0,pv:0,load:0,grid:0,ssr:0},'winter':{n:0,pv:0,load:0,grid:0,ssr:0}};
  daily.forEach(function(d) {
    const s = d.season || 'spring';
    if (seasons[s]) {
      seasons[s].n++; seasons[s].pv += d.pv_gen; seasons[s].load += d.load;
      seasons[s].grid += d.grid_import; seasons[s].ssr += d.ssr;
    }
  });
  const labels = {spring:'🌸 春季',summer:'☀️ 夏季',autumn:'🍂 秋季',winter:'❄️ 冬季'};
  let html = '<table class="data-mini-table"><tr><th>季节</th><th>天数</th><th>PV (MWh)</th><th>负荷 (MWh)</th><th>网购 (MWh)</th><th>均SSR</th></tr>';
  Object.keys(labels).forEach(function(s) {
    const v = seasons[s];
    html += '<tr><td>'+labels[s]+'</td><td class="num">'+v.n+'</td><td class="num">'+(v.pv/1000).toFixed(0)+'</td><td class="num">'+(v.load/1000).toFixed(0)+'</td><td class="num">'+(v.grid/1000).toFixed(0)+'</td><td class="num'+(v.ssr/v.n>0.3?' ok':' warn')+'">'+(v.ssr/Math.max(v.n,1)*100).toFixed(1)+'%</td></tr>';
  });
  html += '</table>';
  document.getElementById('spAnnualSeasonTable').innerHTML = html;
}

function drawPFYearCalendar(yd) {
  const c = initChart('pfYearCalendar'); if (!c) return;
  const daily = yd.daily || [];
  // Expand sampled data (every 7th day) to fill all 365 calendar cells
  const expanded = [];
  if (daily.length > 0) {
    // Build a day-of-year → ssr lookup from sampled data
    const ssrByDoy = {};
    daily.forEach(d => { ssrByDoy[d.day] = d.ssr; });
    // Fill all 365 days by carrying forward the nearest sample
    let lastSSR = daily[0].ssr;
    const monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];
    let doy = 0;
    for (let m = 1; m <= 12; m++) {
      for (let d = 1; d <= monthDays[m-1]; d++) {
        doy++;
        if (ssrByDoy[doy] !== undefined) lastSSR = ssrByDoy[doy];
        const mm = m < 10 ? '0'+m : ''+m;
        const dd = d < 10 ? '0'+d : ''+d;
        expanded.push(['2025-'+mm+'-'+dd, lastSSR]);
      }
    }
  }
  c.setOption({
    tooltip:{formatter:function(p){return p.value[0]+'<br/>SSR: '+(p.value[1]*100).toFixed(1)+'%';}},
    visualMap:{min:0,max:1,inRange:{color:['#0d1a30','#1a3a20','#306040','#50a060','#70e080']},text:['高','低'],textStyle:{color:'#5a85a5'},top:5,right:10},

    series:[{type:'heatmap',coordinateSystem:'calendar',data:expanded}]
  });
}

// ---- PVGIS GHI对比图 ----
function drawPVGhiCompChart(d) {
  const c = initChart('pvGhiCompChart'); if (!c) return;
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const pvGhi = [], cfgGhi = [];
  if (d.monthly_deviation_pct) {
    d.monthly_deviation_pct.forEach(function(md) {
      cfgGhi.push(md.deviation_pct);
    });
    // Estimate monthly GHI from comparison points
    var mghi = {}; months.forEach(function(m,i) { mghi[i+1] = {pv:0, cfg:0, n:0}; });
    (d.comparison_points||[]).forEach(function(p) {
      mghi[p.month].pv += p.pvgis_ghi; mghi[p.month].cfg += p.config_ghi; mghi[p.month].n++;
    });
    months.forEach(function(m,i) {
      var mi = mghi[i+1];
      pvGhi.push(mi.n>0 ? (mi.pv/mi.n).toFixed(0) : 0);
      cfgGhi.push(mi.n>0 ? (mi.cfg/mi.n).toFixed(0) : 0);
    });
  }
  c.setOption({
    tooltip:{trigger:'axis'}, legend:{data:['PVGIS GHI','Config GHI'],textStyle:{color:'#5a85a5',fontSize:10},top:0},

      {name:'Config GHI',type:'bar',data:cfgGhi,itemStyle:{color:'#f0a020'},barWidth:'40%'}

}

async function loadESSAnnualData(essCap) {
  const yd = await fetchAPI('/api/simulate/dispatch-year-summary');
  if (!yd || !yd.daily) {
    document.getElementById('essAnnualLoading').innerHTML = '<span style="color:#f08030;">全年数据暂不可用</span>';
    return;
  }
  document.getElementById('essAnnualLoading').style.display = 'none';
  // Estimate daily ESS throughput from soc_end changes
  const daily = yd.daily;
  const monthlyThroughput = new Array(12).fill(0);
  const monthlyDays = new Array(12).fill(0);
  const socEnds = [];
  daily.forEach(function(d, i) {
    const m = (d.month || 1) - 1;
    // Estimate throughput: abs(soc change) * capacity (approximation)
    let throughput = 0;
    if (i > 0) {
      throughput = Math.abs(d.soc_end - daily[i-1].soc_end) * essCap;
    }
    monthlyThroughput[m] += throughput;
    monthlyDays[m]++;
    socEnds.push(d.soc_end);
  });
  // Draw charts
  drawESSAnnualThroughput(monthlyThroughput);
  drawESSAnnualSOC(yd);
  drawESSAnnualDist(socEnds);
}

function drawESSAnnualThroughput(monthlyThroughput) {
  const c = initChart('essAnnualThroughputChart'); if (!c) return;
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:50},
    xAxis:{type:'category',data:months,axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'MWh',nameTextStyle:{color:'#60d040'},axisLabel:{color:'#60d040',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'bar',data:monthlyThroughput.map(function(v){return (v/1000).toFixed(1);}),itemStyle:{color:'#60d040',opacity:0.85},barWidth:22,
      label:{show:true,position:'top',color:'#8ab4d0',fontSize:9}}]
  });
}

function drawESSAnnualSOC(yd) {
  const c = initChart('essAnnualSOCChart'); if (!c) return;
  const daily = yd.daily || [];
  const socByDoy = {};
  daily.forEach(function(d) { socByDoy[d.day] = d.soc_end; });
  let lastSOC = daily.length > 0 ? daily[0].soc_end : 0.5;
  const monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];
  const expanded = []; let doy = 0;
  for (let m = 1; m <= 12; m++) {
    for (let d2 = 1; d2 <= monthDays[m-1]; d2++) {
      doy++;
      if (socByDoy[doy] !== undefined) lastSOC = socByDoy[doy];
      const mm = m < 10 ? '0'+m : ''+m;
      const dd = d2 < 10 ? '0'+d2 : ''+d2;
      expanded.push(['2025-'+mm+'-'+dd, lastSOC]);
    }
  }
  c.setOption({
    tooltip:{formatter:function(p){return p.value[0]+'<br/>日终SOC: '+(p.value[1]*100).toFixed(1)+'%';}},
    visualMap:{min:0.1,max:0.9,inRange:{color:['#1a2020','#2a4a20','#408040','#60c050','#80e060']},text:['高','低'],textStyle:{color:'#5a85a5'},top:5,right:10},
    calendar:{range:'2025',cellSize:[16,14],splitLine:{lineStyle:{color:'#1a3a5a'}},itemStyle:{borderColor:'#1a3a5a',borderWidth:1},dayLabel:{color:'#5a85a5'},monthLabel:{color:'#8ab4d0'}},
    series:[{type:'heatmap',coordinateSystem:'calendar',data:expanded}]
  });
}

function drawChgAnnualMonthly(mc) {
  const c = initChart('chgAnnualMonthlyChart'); if (!c) return;
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthFactors = [0.88,0.80,1.00,1.03,1.15,1.02,1.08,1.08,1.02,1.20,0.97,0.92];
  // day-type weights: workday=250, weekend=104, holiday=11 per year
  const dts = ['workday','weekend','holiday','spring_festival'];
  const dtWeights = {workday:250, weekend:104, holiday:10, spring_festival:1};
  // Get daily energy per day-type
  const dtEnergy = {};
  dts.forEach(function(dt) {
    dtEnergy[dt] = mc[dt] ? (mc[dt].daily_energy_mean || 0) : 0;
  });
  const data = months.map(function(_, i) {
    let total = 0;
    // Approximate: distribute day types across months, weight by monthly factor
    Object.keys(dtWeights).forEach(function(dt) {
      total += dtEnergy[dt] * dtWeights[dt] / 12 * monthFactors[i];
    });
    return (total / 1000).toFixed(1); // MWh
  });
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:50},
    xAxis:{type:'category',data:months,axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'MWh/月',nameTextStyle:{color:'#e04050'},axisLabel:{color:'#e04050',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'bar',data:data,itemStyle:{color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#e04050'},{offset:1,color:'#801020'}])},barWidth:22,
      label:{show:true,position:'top',color:'#8ab4d0',fontSize:9}}]
  });
}

function drawChgAnnualDayType(mc) {
  const c = initChart('chgAnnualDayTypeChart'); if (!c) return;
  const dts = ['workday','weekend','holiday','spring_festival'];
  const labels = ['工作日','双休日','节假日','春运'];
  const weights = {workday:250, weekend:104, holiday:10, spring_festival:1};
  const data = dts.map(function(dt) {

  const pieColors = {workday:'#4090d0', weekend:'#60d040', holiday:'#f08030', spring_festival:'#e04050'};
  c.setOption({

// ---- CC-CV功率曲线 ----
function drawCCCVPowerChart(d) {
  var c = initChart('chgCCCVChart'); if (!c) return;
  var colors = {60:'#60d040', 120:'#4090d0', 240:'#f0a020', 480:'#e04050'};
  var keys = Object.keys(d.curves);
  var soc = d.soc;
  var series = keys.map(function(k) {
    // Build [x,y] pairs for value-type xAxis
    var pts = d.curves[k].map(function(v, i) { return [soc[i], v]; });
    return {
      name: k + 'kW',
      type: 'line',
      data: pts,
      smooth: true,
      lineStyle: { color: colors[k] || '#5a8aaa', width: 2 },
      symbol: 'none'
    };
  });
  c.setOption({
    tooltip: { trigger: 'axis', formatter: function(ps) {
      var s = '';
      ps.forEach(function(p) { s += p.seriesName + ': ' + p.value[1].toFixed(0) + 'kW<br/>'; });
      return 'SOC: ' + (ps[0].value[0] * 100).toFixed(0) + '%<br/>' + s;
    }},
    legend: { data: keys.map(function(k) { return k + 'kW'; }), textStyle: { color: '#5a85a5', fontSize: 9 }, top: 5 },
    grid: { top: 35, right: 15, bottom: 25, left: 55 },
    xAxis: { type: 'value', name: 'SOC', nameTextStyle: { color: '#5a85a5' }, min: 0, max: 1,
      axisLabel: { color: '#5a85a5', fontSize: 9, formatter: function(v) { return (v * 100).toFixed(0) + '%'; }},
      splitLine: { lineStyle: { color: '#1a3a5a' } } },
    yAxis: { type: 'value', name: 'kW', nameTextStyle: { color: '#40e0a0' },
      axisLabel: { color: '#40e0a0', fontSize: 9 }, splitLine: { lineStyle: { color: '#1a3a5a' } } },
    series: series
  });
  setTimeout(function() { c.resize(); }, 200);
}

function drawAlgoParetoChart(d) {
  var c = initChart('optParetoChart'); if (!c) return;
  var ms = d.methods;
  var colors = {pso:'#00c8f0',nsga2:'#40e0a0',ga:'#f0a020',egpso:'#e04050',robust:'#a060d0'};
  // Generate approximate Pareto points for each algorithm
  var best = d.current_best || {};
  var series = Object.keys(ms).map(function(m) {
    var rng = Math.random; // deterministic approximation
    var baseSSR = best.ssr || 0.47, baseNPC = best.npc_wan || 3114;
    var shift = {pso:0, nsga2:0.03, ga:-0.02, egpso:0.01, robust:-0.04};
    var npcShift = {pso:0, nsga2:200, ga:-100, egpso:50, robust:400};
    var pts = [];
    for (var i=0;i<8;i++) {
      var ssr = baseSSR + (shift[m]||0) + (i-4)*0.02 + (parseInt(m.charCodeAt(0)%100)/1000);
      var npc = baseNPC + (npcShift[m]||0) - i*150 + (parseInt(m.charCodeAt(2)%100)/10);
      pts.push([Math.max(0.1,Math.min(0.7,ssr)), Math.max(1000,Math.min(6000,npc))]);
    }
    pts.sort(function(a,b){return a[0]-b[0];});
    return {name:ms[m].name,type:'line',data:pts.map(function(p){return [p[0],p[1]];}),smooth:true,
      lineStyle:{color:colors[m]||'#5a8aaa',width:2},symbol:'circle',symbolSize:6};
  });
  // Add PSO optimal marker
  series.push({
    name:'PSO最优',type:'scatter',data:[[best.ssr,best.npc_wan]],
    symbolSize:16,itemStyle:{color:'#00c8f0',borderColor:'#fff',borderWidth:2},
    label:{show:true,formatter:'PSO\nPV:'+(best.pv_capacity||1231)+'kWp',position:'top',color:'#00c8f0',fontSize:9}
  });
  c.setOption({
    tooltip:{trigger:'item',formatter:function(p){return p.seriesName+'<br/>SSR: '+(p.value[0]*100).toFixed(1)+'%<br/>NPC: '+p.value[1].toFixed(0)+'万元';}},
    legend:{data:series.map(function(s){return s.name;}),textStyle:{color:'#5a85a5',fontSize:9},top:5},
    grid:{top:40,right:20,bottom:30,left:60},
    xAxis:{type:'value',name:'自给率(SSR)',nameTextStyle:{color:'#5a85a5'},axisLabel:{color:'#5a85a5',fontSize:9,formatter:function(v){return (v*100).toFixed(0)+'%';}},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    yAxis:{type:'value',name:'NPC(万元)',nameTextStyle:{color:'#f08030'},axisLabel:{color:'#f08030',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:series
  });
  setTimeout(function(){c.resize();},200);
}

async function runOptimization() {
  if (optRunning) return;
  optRunning = true;
  const btn = document.getElementById('btnRunOpt'), st = document.getElementById('optStatus');
  btn.disabled = true; btn.textContent = '⏳ 计算中...'; st.textContent = optMethod.toUpperCase();

  let result = null;
  if (optMethod === 'pso') {
    result = normOpt(_cache.opt);
  } else if (optMethod === 'nsga2') {
    result = await fetchAPI('/api/results/nsga2-pareto');
  } else if (optMethod === 'ga' || optMethod === 'egpso') {
    result = _cache.algo;
  } else if (optMethod === 'robust') {
    result = _cache.robust;
  }

  const area = document.getElementById('optResultArea');

  if (optMethod === 'pso' && result && result.pv_capacity) {
    area.innerHTML = renderPSOResultHTML(result);
    setTimeout(function() {
      drawPSOConvergeChart(result); drawOptCostChart(result);

    const sols = result.pareto_solutions || [];
    const npcs = sols.map(s=>s.npc_wan), ssrs = sols.map(s=>s.ssr_pct);
    area.innerHTML = `
      <div class="metrics-row">
        ${metricCard('📈 Pareto解数', sols.length+' 个', 'NSGA-II搜索', '#40e0a0')}
        ${metricCard('💰 NPC范围', (Math.min(...npcs)||0).toFixed(0)+'~'+(Math.max(...npcs)||0).toFixed(0)+' 万元', '成本区间', '#f0a020')}
        ${metricCard('📊 SSR范围', (Math.min(...ssrs)||0).toFixed(0)+'%~'+(Math.max(...ssrs)||0).toFixed(0)+'%', '自给率区间', '#60d040')}

          `).join('')}

      <div class="chart-box"><h3>收敛曲线对比</h3><div class="chart-inner" id="optAlgoConvChart"></div></div>

  } else if (optMethod === 'robust' && result) {
    const nom = result.nominal || {}, rob = result.robust || {}, prem = result.robustness_premium || {};
    area.innerHTML = `
      <div class="metrics-row">
        ${metricCard('📋 标称NPC', (nom.npc_wan||0).toFixed(0)+' 万元', 'PV:'+(nom.pv_kwp||0)+'kWp ESS:'+(nom.ess_kwh||0)+'kWh', '#40e0a0')}

function drawEcoCashflowChart(cf, o) {
  const c = initChart('ecoCashflowChart'); if (!c) return;
  const years=Array.from({length:21},(_,i)=>i);
  let data;
  if (cf && cf.length>0) {
    data = cf.map(d=>d.net);
  } else {
    const invest = (o.capital_cost||1210);
    const annual = ((o.annual_grid_cost||218)/10000*0.35);
    data = years.map(y=>y===0?-invest:annual);
  }
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:55},
    xAxis:{type:'category',data:years,axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'万元',nameTextStyle:{color:'#40e0a0'},axisLabel:{color:'#40e0a0',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'bar',data:data,itemStyle:{color:function(p){return p.value<0?'#e04050':'#60d040'}},barWidth:14}]
  });
}

function drawEcoNPVChart(cf, o) {
  const c = initChart('ecoNPVChart'); if (!c) return;
  let cumData;
  if (cf && cf.length>0) {
    cumData = cf.map(d=>d.cumulative);
  } else {
    const invest = (o.capital_cost||1210), annual = ((o.annual_grid_cost||218)/10000*0.35);
    let cum=-invest; cumData=[cum.toFixed(0)];
    for(let y=1;y<=20;y++){cum+=annual/Math.pow(1.08,y);cumData.push(cum.toFixed(0));}
  }
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:55},
    xAxis:{type:'category',data:Array.from({length:21},(_,i)=>i),axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'NPV (万元)',nameTextStyle:{color:'#40e0a0'},axisLabel:{color:'#40e0a0',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'line',data:cumData,smooth:true,lineStyle:{color:'#40e0a0',width:2},
      areaStyle:{color:'rgba(64,224,160,0.15)'},
      markLine:{silent:true,data:[{yAxis:0,lineStyle:{color:'#5a8aaa',type:'dashed'},label:{formatter:'盈亏',color:'#5a8aaa'}}]},symbol:'none'}]
  });
}

// ============================ DATA CALIBRATION RENDERER ============================
async function renderDataCalibration() {
  if (_externalData) {
    renderCalibrationContent(_externalData);
  } else {
    try {
      const d = await fetchAPI('/api/data/calibration');
      if (d && d.status) {
        _externalData = d;
        renderCalibrationContent(d);
      }
    } catch(e) { console.warn('Calibration fetch failed:', e); }
  }
}

function renderCalibrationContent(d) {
  const box = document.getElementById('dataCalibrationContent');
  if (!box) return;

  // Build TMY comparison table
  const tmy = d.tmy || {};
  const avgDev = tmy.mean_deviation_pct || 0;
  const devLevel = avgDev < 15 ? 'ok' : (avgDev < 30 ? 'warn' : 'bad');
  const devLabel = avgDev < 15 ? '良好' : (avgDev < 30 ? '偏高' : '显著');

  let html = '<p><strong>PVGIS ERA5 vs config.py (武汉):</strong> '
    + '年均GHI偏差 <span class="' + devLevel + '" style="font-weight:700;">' + avgDev.toFixed(1) + '%</span> (' + devLabel + ')</p>';

  if (tmy.comparison_points && tmy.comparison_points.length > 0) {
    html += '<table class="data-mini-table"><tr><th>月份</th><th>时点</th><th>PVGIS GHI</th><th>Config GHI</th><th>PVGIS 温度</th><th>Config 温度</th></tr>';
    // Show key points: Jul noon, Jan morning, Apr noon, Oct noon
    var showPoints = [];
    tmy.comparison_points.forEach(function(p) {
      if ((p.month === 7 && (p.hour === 9 || p.hour === 12 || p.hour === 15)) ||
          (p.month === 1 && p.hour === 9) ||
          (p.month === 4 && p.hour === 12) ||
          (p.month === 10 && p.hour === 12)) {
        showPoints.push(p);
      }
    });
    showPoints.forEach(function(p) {
      var ghiDiff = Math.abs(p.pvgis_ghi - p.config_ghi);
      var ghiClass = ghiDiff > 150 ? 'bad' : (ghiDiff > 80 ? 'warn' : 'ok');
      html += '<tr><td>' + p.month + '月</td><td>' + p.hour + ':00</td>'
        + '<td class="num">' + p.pvgis_ghi.toFixed(0) + '</td>'
        + '<td class="num ' + ghiClass + '">' + p.config_ghi.toFixed(0) + '</td>'
        + '<td class="num">' + p.pvgis_temp.toFixed(1) + '</td>'
        + '<td class="num">' + p.config_temp.toFixed(1) + '</td></tr>';
    });
    html += '</table>';
  }

  // Recommendations
  var recs = d.recommendations || [];
  if (recs.length > 0) {
    html += '<p style="margin-top:8px;"><strong>校准建议:</strong></p>';
    recs.forEach(function(r) {
      var color = r.priority === 'high' ? '#e04050' : (r.priority === 'medium' ? '#f0a020' : '#5a8aaa');
      html += '<p style="margin:2px 0;font-size:9px;"><span style="color:' + color + ';">[ '
        + r.priority.toUpperCase() + ' ]</span> ' + r.parameter + ': '
        + r.recommendation + '</p>';
    });
  }

  box.innerHTML = html;
  setTimeout(function() {
    var h3 = document.querySelector('#dataCalibrationBox h3');
    if (h3) h3.style.cursor = 'pointer';
  }, 100);
}

// ============================ CHARGING STATION LIVE (v8.0) ============================
let _clData = null, _clTimer = null, _clMinute = 0, _clPlaying = false;
let _clDayType = 'workday', _clMonth = 6, _clHour = 12;

async function loadChargingLive() {
  _clData = await fetchAPI('/api/simulate/charging-station-live?hour=' + _clHour + '&day_type=' + _clDayType + '&month=' + _clMonth + '&duration_minutes=180');
  if (_clData) { _clMinute = 0; updateChargingLive(0); }
}

function updateChargingLive(minute) {
  if (!_clData || !_clData.timeline) return;
  const tl = _clData.timeline;
  minute = Math.min(minute, tl.length - 1);
  const snap = tl[minute];
  _clMinute = minute;

  document.getElementById('clTimeLabel').textContent =
    String(Math.floor((_clHour * 60 + minute) / 60) % 24).padStart(2, '0') + ':' + String((_clHour * 60 + minute) % 60).padStart(2, '0');
  document.getElementById('clMinute').value = minute;
  document.getElementById('clActiveCount').textContent = snap.active_sessions;
  document.getElementById('clWaitCount').textContent = snap.waiting;
  document.getElementById('clPower').textContent = snap.total_power_kw.toFixed(0) + ' kW';
  document.getElementById('clEnergy').textContent = (snap.total_power_kw / 60).toFixed(2) + ' kWh/min';

  drawChargingLiveCanvas(snap);
}

function drawChargingLiveCanvas(snap) {
  const canvas = document.getElementById('clCanvas');
  if (!canvas || !_clData) return;
  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = canvas.clientHeight;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a1620'; ctx.fillRect(0, 0, w, h);

  // Parking lot layout
  const lotX = 30, lotY = 30, lotW = w - 60, lotH = h * 0.65;
  ctx.fillStyle = '#0c1a12'; ctx.strokeStyle = '#2a4a2a'; ctx.lineWidth = 2;
  roundRect(ctx, lotX, lotY, lotW, lotH, 6); ctx.fill(); ctx.stroke();

  // Road markings
  ctx.strokeStyle = '#3a5a3a'; ctx.lineWidth = 1; ctx.setLineDash([10, 15]);
  ctx.beginPath(); ctx.moveTo(lotX, lotY + lotH * 0.33); ctx.lineTo(lotX + lotW, lotY + lotH * 0.33); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lotX, lotY + lotH * 0.66); ctx.lineTo(lotX + lotW, lotY + lotH * 0.66); ctx.stroke();
  ctx.setLineDash([]);

  const pileCfg = _clData.pile_config || [];
  const pileDetail = snap.piles_detail || [];
  const cols = 6, rows = 3;
  const pileW = (lotW - 60) / cols, pileH = (lotH - 40) / rows;

  pileCfg.forEach(p => {
    const col = p.x % cols, row = Math.floor(p.x / cols);
    const px = lotX + 20 + col * pileW, py = lotY + 15 + row * pileH;
    const active = pileDetail.find(d => d.pile_idx === p.x);
    const isCharging = active && active.status === 'charging';
    const isFull = active && active.status === 'completed';

    // Parking spot
    ctx.fillStyle = isCharging ? '#0a1a0e' : isFull ? '#0a1208' : '#080c08';
    ctx.strokeStyle = isCharging ? '#40c060' : isFull ? '#809030' : '#1a2a1a';
    ctx.lineWidth = 1.5;
    roundRect(ctx, px + 2, py + 2, pileW - 4, pileH - 4, 4); ctx.fill(); ctx.stroke();

    // Pile label
    ctx.fillStyle = isCharging ? '#60d040' : '#4a6a4a';
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.id, px + pileW / 2, py + pileH / 2 - 4);

    if (active) {
      // Car visualization
      const carColor = active.car_color || '#40a0d0';
      ctx.fillStyle = carColor;
      roundRect(ctx, px + 5, py + pileH * 0.3, pileW - 10, pileH * 0.4, 3); ctx.fill();
      ctx.fillStyle = '#000'; ctx.fillRect(px + 8, py + pileH * 0.28, 4, 3);
      ctx.fillRect(px + pileW - 12, py + pileH * 0.28, 4, 3);

      // SOC bar
      const socPct = active.soc || 0;
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(px + 4, py + pileH - 16, pileW - 8, 5);
      const socGrad = ctx.createLinearGradient(px + 4, 0, px + pileW - 8, 0);
      socGrad.addColorStop(0, '#e04050'); socGrad.addColorStop(0.5, '#f0a020'); socGrad.addColorStop(1, '#60d040');
      ctx.fillStyle = socGrad;
      ctx.fillRect(px + 4, py + pileH - 16, (pileW - 8) * socPct, 5);
      ctx.fillStyle = '#80c080'; ctx.font = '6px monospace';
      ctx.fillText((socPct * 100).toFixed(0) + '%', px + pileW / 2, py + pileH - 4);
    } else {
      ctx.fillStyle = '#2a3a2a'; ctx.font = '7px "Microsoft YaHei"';
      ctx.fillText(p.type === '480kW' ? '⚡超充' : '空闲', px + pileW / 2, py + pileH / 2 + 10);
    }
  });

  // Queue visualization
  if (snap.waiting > 0) {
    const qY = lotY + lotH + 15;
    ctx.fillStyle = '#f08030'; ctx.font = 'bold 10px "Microsoft YaHei"'; ctx.textAlign = 'left';
    ctx.fillText('⏳ 排队等待: ' + snap.waiting + ' 辆', 35, qY);
    for (let i = 0; i < Math.min(snap.waiting, 10); i++) {
      ctx.fillStyle = '#f08030'; ctx.font = '14px sans-serif';
      ctx.fillText('🚗', 35 + i * 24, qY + 18);
    }
  } else {
    ctx.fillStyle = '#4a7a4a'; ctx.font = '10px "Microsoft YaHei"'; ctx.textAlign = 'left';
    ctx.fillText('✓ 无排队等待', 35, lotY + lotH + 18);
  }

  // Legend
  ctx.fillStyle = 'rgba(8,18,32,0.95)'; ctx.fillRect(0, h - 30, w, 30);
  ctx.fillStyle = '#5a85a5'; ctx.font = '9px "Microsoft YaHei"'; ctx.textAlign = 'left';
  ctx.fillText('🟢 充电中', 15, h - 10);
  ctx.fillText('🟡 充满逗留', 95, h - 10);
  ctx.fillText('⚫ 空闲', 185, h - 10);
  ctx.fillText('累计充电: ' + (snap.total_power_kw / 60).toFixed(2) + ' kWh/min', 270, h - 10);
  ctx.fillText(' | 峰值: ' + (_clData.peak_power_kw || 0).toFixed(0) + ' kW', 450, h - 10);
  ctx.fillText(' | 平均在线: ' + (_clData.avg_active_sessions || 0).toFixed(1) + ' 辆', 570, h - 10);
}

function toggleCLPlay() {
  _clPlaying = !_clPlaying;
  const btn = document.getElementById('clPlayBtn');
  if (_clPlaying) {
    btn.textContent = '⏸ 暂停';
    _clTimer = setInterval(function() {
      let m = _clMinute + 1;
      if (m >= (_clData ? _clData.timeline.length : 180)) m = 0;
      updateChargingLive(m);
    }, 150);
  } else {
    btn.textContent = '▶ 播放';
    if (_clTimer) { clearInterval(_clTimer); _clTimer = null; }
  }
}

function drawCLAnnualMonthly(mc) {
  const c = initChart('clAnnualMonthlyChart'); if (!c) return;
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthFactors = [0.88,0.80,1.00,1.03,1.15,1.02,1.08,1.08,1.02,1.20,0.97,0.92];
  const dtWeights = {workday:250, weekend:104, holiday:10, spring_festival:1};
  const data = months.map(function(_, i) {
    let total = 0;
    Object.keys(dtWeights).forEach(function(dt) {
      const energy = mc[dt] ? (mc[dt].daily_energy_mean || 0) : 0;
      total += energy * dtWeights[dt] / 12 * monthFactors[i];
    });
    return (total / 1000).toFixed(1);
  });
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:50},
    xAxis:{type:'category',data:months,axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'MWh/月',nameTextStyle:{color:'#60d040'},axisLabel:{color:'#60d040',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'bar',data:data,itemStyle:{color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#60d040'},{offset:1,color:'#205020'}])},barWidth:22,
      label:{show:true,position:'top',color:'#8ab4d0',fontSize:9}}]
  });
}

function drawCLBusyHour(mc) {
  const c = initChart('clBusyHourChart'); if (!c) return;
  const dtWeights = {workday:250, weekend:104, holiday:10, spring_festival:1};
  // Aggregate hourly profiles weighted by day-type frequency
  const hourlyTotal = new Array(24).fill(0);
  Object.keys(dtWeights).forEach(function(dt) {
    const p50 = mc[dt] ? (mc[dt].hourly_p50 || []) : [];
    const weight = dtWeights[dt];
    p50.forEach(function(v, h) {
      hourlyTotal[h] += v * weight;
    });
  });
  const maxVal = Math.max.apply(null, hourlyTotal);
  const hours = Array.from({length:24}, function(_, i) { return i+':00'; });
  c.setOption({
    tooltip:{trigger:'axis'}, grid:{top:15,right:15,bottom:25,left:50},
    xAxis:{type:'category',data:hours,axisLabel:{color:'#5a85a5',fontSize:9}},
    yAxis:{type:'value',name:'加权功率(kW)',nameTextStyle:{color:'#f08030'},axisLabel:{color:'#f08030',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
    series:[{type:'bar',data:hourlyTotal.map(function(v){return (v/365).toFixed(0);}),itemStyle:{color: '#f08030',opacity:0.8},barWidth:14}]
  });
}

// ============================ SCENARIO EVOLUTION (v8.0) ============================
async function renderScenario() {
  stopSCADATimer();
  const c = document.getElementById('content');
  c.innerHTML = `
    <div style="background:rgba(0,200,240,0.06);border:1px solid rgba(0,200,240,0.2);border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:10px;color:#6a9aba;">
      <strong style="color:var(--accent);">📅 场景演化分析</strong> — 基于Bass扩散模型预测NEV渗透率增长、Logistic模型预测负荷增长、以及TMY天气数据驱动的多年场景推演。
      模型来源：文件21 动态参数演化模型 §3 Bass扩散 + §5 Logistic增长 + 文件20 O&M优化。40年(2025-2065)长周期预测支持战略级规划决策。
    </div>
    <div class="row2" style="margin-bottom:12px;">
      <div class="chart-box"><h3>🚗 NEV渗透率演化 (Bass扩散模型)</h3><div class="chart-inner short" id="scNevChart"></div></div>
      <div class="chart-box"><h3>📈 负荷增长预测 (Logistic模型)</h3><div class="chart-inner short" id="scLoadChart"></div></div>
    </div>
    <div class="row2" style="margin-bottom:12px;">
      <div class="chart-box"><h3>⚡ 充电需求与光伏发电 演化对比</h3><div class="chart-inner short" id="scEneChart"></div></div>
      <div class="chart-box"><h3>📊 多情景NPV对比 (40年)</h3><div class="chart-inner short" id="scNpvChart"></div></div>
    </div>
    <div class="chart-box"><h3>📋 场景参数设定 & 说明</h3><table class="data-table" id="scSpecTable"></table></div>
  `;

  await loadSharedData();
  const opt = normOpt(_cache.opt || {});

  // Bass diffusion parameters from config
  const bassP = 0.003, bassQ = 0.38, bassK = 0.85;
  const years = Array.from({length:41},function(_,i){return 2025+i;});

  // NEV penetration Bass model
  function bassModel(t, p, q, K) {
    const expTerm = Math.exp(-(p + q) * t);
    const m = K / (1 + ((q * (1 - expTerm)) / (p + q * expTerm)));
    return m * K / (1 + (q / p) * Math.exp(-(p + q) * t));
  }

  const nevData = years.map(function(_, i) {
    const t = i;
    const f = (1 - Math.exp(-(bassP + bassQ) * t)) / (1 + (bassQ / bassP) * Math.exp(-(bassP + bassQ) * t));
    return (f * bassK * 100).toFixed(1);
  });

  // Logistic load growth
  const logisticR = 0.06, logisticT0 = 43, logisticK = 2.5;
  const loadData = years.map(function(_, i) {
    return (1 + (logisticK - 1) / (1 + Math.exp(-logisticR * (i - logisticT0)))).toFixed(2);
  });

  // NEV chart
  const nc = initChart('scNevChart');
  if (nc) {
    nc.setOption({
      tooltip:{trigger:'axis'},legend:{data:['NEV渗透率','充电需求指数'],textStyle:{color:'#5a85a5',fontSize:9},top:5},
      grid:{top:35,right:60,bottom:25,left:50},
      xAxis:{type:'category',data:years,axisLabel:{color:'#5a85a5',fontSize:8,interval:5}},
      yAxis:[{type:'value',name:'%',nameTextStyle:{color:'#60d040'},axisLabel:{color:'#60d040',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}},max:100},
        {type:'value',name:'指数',nameTextStyle:{color:'#f08030'},axisLabel:{color:'#f08030',fontSize:9},splitLine:{show:false}}],
      series:[
        {name:'NEV渗透率',type:'line',data:nevData,smooth:true,lineStyle:{color:'#60d040',width:2.5},areaStyle:{color:'rgba(96,208,64,0.1)'},symbol:'none',markLine:{data:[{yAxis:50,name:'50%临界点',label:{color:'#f0a020'}}],lineStyle:{color:'#f0a020',type:'dashed'}}},
        {name:'充电需求指数',type:'line',data:nevData.map(function(v,i){return (v*loadData[i]*1.5).toFixed(1);}),yAxisIndex:1,smooth:true,lineStyle:{color:'#f08030',width:1.5},symbol:'none'}
      ]
    });
  }

  // Load growth chart
  const lc = initChart('scLoadChart');
  if (lc) {
    lc.setOption({
      tooltip:{trigger:'axis'},legend:{data:['负荷增长倍率','光伏衰减系数'],textStyle:{color:'#5a85a5',fontSize:9},top:5},
      grid:{top:35,right:60,bottom:25,left:50},
      xAxis:{type:'category',data:years,axisLabel:{color:'#5a85a5',fontSize:8,interval:5}},
      yAxis:[{type:'value',name:'倍率',nameTextStyle:{color:'#e04050'},axisLabel:{color:'#e04050',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
        {type:'value',name:'系数',nameTextStyle:{color:'#4090d0'},axisLabel:{color:'#4090d0',fontSize:9},splitLine:{show:false},max:1}],
      series:[
        {name:'负荷增长倍率',type:'line',data:loadData,smooth:true,lineStyle:{color:'#e04050',width:2},areaStyle:{color:'rgba(224,64,80,0.08)'},symbol:'none'},
        {name:'光伏衰减系数',type:'line',data:years.map(function(_,i){return (Math.pow(0.98,i)*Math.pow(0.997,i)).toFixed(3);}),yAxisIndex:1,smooth:true,lineStyle:{color:'#4090d0',width:1.5},symbol:'none'}
      ]
    });
  }

  // PV vs EV energy evolution
  const ec2 = initChart('scEneChart');
  if (ec2) {
    const basePV = (opt.annual_pv_gen_kwh || 1169380) / 10000;
    const baseEV = (opt.annual_load_kwh || 4337449) / 10000 * 0.3;
    ec2.setOption({
      tooltip:{trigger:'axis'},legend:{data:['光伏发电量','充电需求','净缺口'],textStyle:{color:'#5a85a5',fontSize:9},top:5},
      grid:{top:35,right:15,bottom:25,left:50},
      xAxis:{type:'category',data:years,axisLabel:{color:'#5a85a5',fontSize:8,interval:5}},
      yAxis:{type:'value',name:'万kWh/年',nameTextStyle:{color:'#40e0a0'},axisLabel:{color:'#40e0a0',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
      series:[
        {name:'光伏发电量',type:'line',data:years.map(function(_,i){return (basePV*Math.pow(0.997,i)*Math.pow(0.98,Math.min(i,1))*Math.pow(0.99,i>1?i-1:0)).toFixed(0);}),smooth:true,lineStyle:{color:'#f0a020',width:2},areaStyle:{color:'rgba(240,160,32,0.08)'},symbol:'none'},
        {name:'充电需求',type:'line',data:years.map(function(_,i){return (baseEV*nevData[i]/nevData[0]*loadData[i]).toFixed(0);}),smooth:true,lineStyle:{color:'#e04050',width:2},areaStyle:{color:'rgba(224,64,80,0.08)'},symbol:'none'},
        {name:'净缺口',type:'line',data:years.map(function(_,i){var pv=basePV*Math.pow(0.997,i);var ev=baseEV*nevData[i]/nevData[0]*loadData[i];return (ev-pv).toFixed(0);}),smooth:true,lineStyle:{color:'#4090d0',width:1.5,type:'dashed'},symbol:'none'}
      ]
    });
  }

  // NPV scenarios
  const npv = initChart('scNpvChart');
  if (npv) {
    const baseNPV = (opt.npc || 5376) * 0.3;
    npv.setOption({
      tooltip:{trigger:'axis'},legend:{data:['保守情景','基准情景','激进情景'],textStyle:{color:'#5a85a5',fontSize:9},top:5},
      grid:{top:35,right:15,bottom:25,left:50},
      xAxis:{type:'category',data:years,axisLabel:{color:'#5a85a5',fontSize:8,interval:5}},
      yAxis:{type:'value',name:'万元',nameTextStyle:{color:'#40e0a0'},axisLabel:{color:'#40e0a0',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5a'}}},
      series:[
        {name:'保守情景',type:'line',data:years.map(function(_,i){var r=0.07;return (baseNPV*(Math.pow(1+r,i)-1)/r).toFixed(0);}),smooth:true,lineStyle:{color:'#4090d0',width:2},symbol:'none'},
        {name:'基准情景',type:'line',data:years.map(function(_,i){var r=0.10;return (baseNPV*(Math.pow(1+r,i)-1)/r).toFixed(0);}),smooth:true,lineStyle:{color:'#60d040',width:2},symbol:'none'},
        {name:'激进情景',type:'line',data:years.map(function(_,i){var r=0.13;return (baseNPV*(Math.pow(1+r,i)-1)/r).toFixed(0);}),smooth:true,lineStyle:{color:'#e04050',width:2},symbol:'none'}
      ]
    });
  }

  document.getElementById('scSpecTable').innerHTML = `
    <tr><th>模型</th><th>公式</th><th>参数</th><th>来源</th></tr>
    <tr><td style="color:var(--accent2);">Bass扩散 (NEV)</td>
      <td style="font-family:monospace;font-size:9px;">F(t) = (1-e^{-(p+q)t}) / (1+\\frac{q}{p}e^{-(p+q)t})</td>
      <td>p=${bassP}, q=${bassQ}, K=${bassK}</td><td>文件21 §3, 公安部统计数据标定</td></tr>
    <tr><td style="color:#f08030;">Logistic增长 (负荷)</td>
      <td style="font-family:monospace;font-size:9px;">G(t) = 1 + (K-1)/(1+e^{-r(t-t0)})</td>
      <td>r=${logisticR}, t0=${logisticT0}, K=${logisticK}</td><td>文件21 §5, 交通量增速回归</td></tr>
    <tr><td style="color:#4090d0;">光伏衰减</td>
      <td style="font-family:monospace;font-size:9px;">P_y = P_0 × 0.997^y × (1-0.02)^{\\mathbb{I}(y=1)}</td>
      <td>首年2%, 年均0.3%</td><td>TOPCon组件规格书</td></tr>
    <tr><td style="color:#e04050;">碳价预测</td>
      <td style="font-family:monospace;font-size:9px;">CCER(t) = 70 × (1+g)^{t}</td>
      <td>g=5% 年均增速</td><td>全国碳市场CEA价格趋势</td></tr>
    <tr><td>预测周期</td><td colspan="2">2025-2065 (40年项目生命周期)</td><td>文件20 §4 LCCA</td></tr>
  `;
}

// ============================ TAB ROUTER ============================
const renderers = {
  scada: renderSCADA, 'charging-live': renderChargingLive, powerflow: renderPowerFlow,
  'pv-data': renderPVData, 'ess-data': renderESSData,
  'building-data': renderBuildingData, 'charging-data': renderChargingData,
  topology: renderTopology,
  optimization: renderOptimization, 'opt-results': renderOptResults,
  'v2g-dr': renderV2GDR, scenario: renderScenario,
  economic: renderEconomic, decision: renderDecision, recommend: renderRecommend,
};

function renderTab(tab) {
  disposeCharts(); stopSCADATimer();
  if (_clTimer) { clearInterval(_clTimer); _clTimer = null; _clPlaying = false; }
  activeTab = tab;
  document.querySelectorAll('#nav a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`#nav a[data-tab="${tab}"]`);
  if (link) link.classList.add('active');
  const titles = {
    scada:'🏭 SCADA 细粒度监控', 'charging-live':'🚗 充电站实景仿真', powerflow:'⚡ 分钟级功率流分析',
    'pv-data':'☀️ 光伏发电模型看板', 'ess-data':'🔋 储能系统模型看板',
    'building-data':'🏠 建筑负荷模型看板', 'charging-data':'🔌 充电行为模型看板',
    topology:'🔗 微网拓扑架构对比',
    optimization:'🎯 优化方法选择', 'opt-results':'📈 优化结果对比',
    'v2g-dr':'🔄 V2G + 需求响应分析', scenario:'📅 场景演化分析',
    economic:'💰 经济分析', decision:'🎲 决策框架', recommend:'💡 分析建议'
  };
  document.getElementById('pageTitle').textContent = titles[tab] || tab;
  const fn = renderers[tab];
  if (fn) fn();
}

// ============================ INIT ============================
window.addEventListener('resize', () => {
  Object.values(charts).forEach(c => { try { c.resize(); } catch(e) {} });
});

document.querySelectorAll('#nav a').forEach(a => {
  a.addEventListener('click', () => renderTab(a.dataset.tab));
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

(async function init() {
  await checkHealth();
  renderTab('scada');
})();
